# Minimal ServiceAccount for OLM v1 loki-operator installation
#
# This is the ABSOLUTE MINIMUM permissions needed based on bundle contents.
# Derived from analyzing bundle/openshift/manifests/ and testing on OCP 4.22.5.
#
# Bundle contains:
# - 4 CustomResourceDefinitions
# - 1 ClusterRole + 1 ClusterRoleBinding
# - 1 Role + 1 RoleBinding
# - 1 ServiceAccount
# - 2 Services
# - 1 ConfigMap
# - 1 Secret
# - 1 ServiceMonitor
# - ValidatingWebhookConfigurations (extracted from CSV by OLM v1)
#
# Usage:
#   kubectl apply -f hack/olmv1/serviceaccount-installer-minimal.yaml

---
apiVersion: v1
kind: Namespace
metadata:
  name: openshift-operators-redhat
  labels:
    app.kubernetes.io/name: loki-operator
    app.kubernetes.io/part-of: loki

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: loki-operator-installer
  namespace: openshift-operators-redhat
  labels:
    app.kubernetes.io/name: loki-operator
    app.kubernetes.io/component: installer
    app.kubernetes.io/part-of: loki

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: loki-operator-installer
  labels:
    app.kubernetes.io/name: loki-operator
    app.kubernetes.io/component: installer
    app.kubernetes.io/part-of: loki
rules:
  # Create CRDs from bundle
  - apiGroups:
      - apiextensions.k8s.io
    resources:
      - customresourcedefinitions
    verbs:
      - create
      - get
      - list
      - update
      - patch
      - watch
  # Create operator RBAC (ClusterRole, ClusterRoleBinding, Role, RoleBinding)
  - apiGroups:
      - rbac.authorization.k8s.io
    resources:
      - clusterroles
      - clusterrolebindings
      - roles
      - rolebindings
    verbs:
      - create
      - get
      - list
      - update
      - patch
      - escalate  # REQUIRED to create ClusterRole with more permissions
      - bind      # REQUIRED to bind ClusterRole to ServiceAccount
      - watch
  # Create operator ServiceAccount + finalizers for owner references
  - apiGroups:
      - ""
    resources:
      - serviceaccounts
    verbs:
      - create
      - get
      - list
      - update
      - patch
      - delete
      - watch
  - apiGroups:
      - ""
    resources:
      - serviceaccounts/finalizers
    verbs:
      - update
  # Create operator Deployment
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - create
      - get
      - list
      - update
      - patch
      - delete
      - watch
  # Create Services
  - apiGroups:
      - ""
    resources:
      - services
    verbs:
      - create
      - get
      - list
      - update
      - patch
      - watch
  # Create ConfigMaps
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - create
      - get
      - list
      - update
      - patch
      - watch
  # Create/access Secrets (metrics token, etc.)
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - create
      - get
      - list
      - update
      - patch
      - watch
  # Create ValidatingWebhookConfigurations
  - apiGroups:
      - admissionregistration.k8s.io
    resources:
      - validatingwebhookconfigurations
      - mutatingwebhookconfigurations
    verbs:
      - create
      - get
      - list
      - update
      - patch
      - watch
  # Read namespaces to verify installation namespace exists
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - get
      - list
  # Create ServiceMonitors
  - apiGroups:
      - monitoring.coreos.com
    resources:
      - servicemonitors
      - prometheusrules
    verbs:
      - create
      - get
      - list
      - update
      - patch
      - watch
  # Access ClusterExtension for owner references
  - apiGroups:
      - olm.operatorframework.io
    resources:
      - clusterextensions
    verbs:
      - get
      - list

  - apiGroups:
      - olm.operatorframework.io
    resources:
      - clusterextensions/finalizers
    verbs:
      - update

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: loki-operator-installer
  labels:
    app.kubernetes.io/name: loki-operator
    app.kubernetes.io/component: installer
    app.kubernetes.io/part-of: loki
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: loki-operator-installer
subjects:
  - kind: ServiceAccount
    name: loki-operator-installer
    namespace: openshift-operators-redhat
