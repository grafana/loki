---
groups:
- name: logging_loki.rules
  rules:
  - record: code_handler_job_namespace:lokistack_gateway_http_requests:irate1m
    expr: |
      sum(
        irate(
          http_requests_total{container="gateway", group="logsv1"}[1m]
        )
      ) by (code, handler, job, namespace)
  - record: job_namespace_route_statuscode:loki_request_duration_seconds_count:irate1m
    expr: |
      sum(
        irate(
          loki_request_duration_seconds_count[1m]
        )
      ) by (job, namespace, route, status_code)
  - record: job_le_namespace_operation:loki_boltdb_shipper_request_duration_seconds_bucket:rate5m
    expr: |
      sum(
        rate(
          loki_boltdb_shipper_request_duration_seconds_bucket[5m]
        )
      ) by (job, le, namespace, operation)
- name: loki_operator.telemetry
  rules:
  # Storage backend and credential mode
  - record: loki_operator:lokistack_storage_info:count
    expr: |
      count(
        lokistack_storage_info
      ) by (backend_type, credential_mode)
  # Storage schema version
  - record: loki_operator:lokistack_storage_schema_version:count
    expr: |
      count(
        lokistack_storage_schema_version
      ) by (version)
  # Total LokiStack instances by size
  - record: loki_operator:lokistack_info:count
    expr: |
      count(
        lokistack_info
      ) by (size)
  # Component replicas: count stacks with custom replicas per component
  - record: loki_operator:lokistack_component_custom_replicas:count
    expr: |
      count(
        lokistack_component_replicas
      ) by (component)
  # Average set ingestion rate limit
  - record: loki_operator:lokistack_global_ingestion_rate_limit_mb:avg
    expr: |
      avg(
        lokistack_global_ingestion_rate_limit_mb
      )
  # Ingester CPU usage per LokiStack (cores)
  - record: loki_operator:lokistack_ingester_cpu_cores:sum
    expr: |
      sum by (stack_namespace, stack_name) (
        label_replace(
          label_replace(
            rate(container_cpu_usage_seconds_total{
              container!="",
              pod=~"lokistack-.*-ingester-.*"
            }[5m]),
            "stack_name",
            "$1",
            "pod",
            "lokistack-(.*)-ingester-.*"
          ),
          "stack_namespace",
          "$1",
          "namespace",
          "(.*)"
        )
      )
  # Ingester memory usage per LokiStack (bytes)
  - record: loki_operator:lokistack_ingester_memory_working_set_bytes:sum
    expr: |
      sum by (stack_namespace, stack_name) (
        label_replace(
          label_replace(
            container_memory_working_set_bytes{
              container!="",
              pod=~"lokistack-.*-ingester-.*"
            },
            "stack_name",
            "$1",
            "pod",
            "lokistack-(.*)-ingester-.*"
          ),
          "stack_namespace",
          "$1",
          "namespace",
          "(.*)"
        )
      )
  # Observed ingestion rate (received - discarded) per LokiStack (MB/s)
  - record: loki_operator:lokistack_ingestion_rate_mb_per_second:sum
    expr: |
      sum by (stack_namespace, stack_name) (
        label_replace(
          label_replace(
            (
              rate(loki_distributor_bytes_received_total{
                container="loki-distributor",
                pod=~"lokistack-.*-distributor-.*"
              }[5m])
              -
              (rate(loki_discarded_bytes_total{
                container="loki-distributor",
                pod=~"lokistack-.*-distributor-.*"
              }[5m]) or
               rate(loki_distributor_bytes_received_total{
                 container="loki-distributor",
                 pod=~"lokistack-.*-distributor-.*"
               }[5m]) * 0)
            ) / (1024 * 1024),
            "stack_name",
            "$1",
            "pod",
            "lokistack-(.*)-distributor-.*"
          ),
          "stack_namespace",
          "$1",
          "namespace",
          "(.*)"
        )
      )
