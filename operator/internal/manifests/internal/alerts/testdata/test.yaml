rule_files:
  - ../prometheus-alerts.yaml
  - ../prometheus-rules.yaml

evaluation_interval: 1m

tests:
  - interval: 1m

    input_series:
      - series: 'job_namespace_route_statuscode:loki_request_duration_seconds_count:irate1m{status_code="500", namespace="my-ns", job="ingester", route="my-route"}'
        values: '1+1x20'
      - series: 'job_namespace_route_statuscode:loki_request_duration_seconds_count:irate1m{status_code="429", namespace="my-ns", job="ingester", route="my-route"}'
        values: '1+1x20'
      - series: 'job_namespace_route_statuscode:loki_request_duration_seconds_count:irate1m{status_code="200", namespace="my-ns", job="ingester", route="my-route"}'
        values: '1+3x20'
      - series: 'code_handler_job_namespace:lokistack_gateway_http_requests:irate1m{code="500", namespace="my-ns", job="gateway", handler="push"}'
        values: '1+1x20'
      - series: 'code_handler_job_namespace:lokistack_gateway_http_requests:irate1m{code="200", namespace="my-ns", job="gateway", handler="push"}'
        values: '1+3x20'
      - series: 'code_handler_job_namespace:lokistack_gateway_http_requests:irate1m{code="500", namespace="my-ns", job="gateway", handler="query"}'
        values: '1+1x20'
      - series: 'code_handler_job_namespace:lokistack_gateway_http_requests:irate1m{code="200", namespace="my-ns", job="gateway", handler="query"}'
        values: '1+3x20'

      - series: 'loki_panic_total{namespace="my-ns", job="ingester"}'
        values: '0+0.2x11'

      - series: 'loki_ingester_wal_replay_flushing{namespace="my-ns", job="ingester"}'
        values: '0 1+0x20'

      - series: 'loki_request_duration_seconds_bucket{namespace="my-ns", job="ingester", route="my-route", le="1"}'
        values: '0+10x60'
      - series: 'loki_request_duration_seconds_bucket{namespace="my-ns", job="ingester", route="my-route", le="5"}'
        values: '0+50x60'
      - series: 'loki_request_duration_seconds_bucket{namespace="my-ns", job="ingester", route="my-route", le="10"}'
        values: '0+100x60'
      - series: 'loki_request_duration_seconds_bucket{namespace="my-ns", job="ingester", route="my-route", le="+Inf"}'
        values: '0+100x60'

      - series: 'job_le_namespace_operation:loki_boltdb_shipper_request_duration_seconds_bucket:rate5m{namespace="my-ns", job="ingester", operation="WRITE", le="1"}'
        values: '0+10x20'
      - series: 'job_le_namespace_operation:loki_boltdb_shipper_request_duration_seconds_bucket:rate5m{namespace="my-ns", job="ingester", operation="WRITE", le="5"}'
        values: '0+50x20'
      - series: 'job_le_namespace_operation:loki_boltdb_shipper_request_duration_seconds_bucket:rate5m{namespace="my-ns", job="ingester", operation="WRITE", le="10"}'
        values: '0+100x20'
      - series: 'job_le_namespace_operation:loki_boltdb_shipper_request_duration_seconds_bucket:rate5m{namespace="my-ns", job="ingester", operation="WRITE", le="+Inf"}'
        values: '0+100x20'
      - series: 'job_le_namespace_operation:loki_boltdb_shipper_request_duration_seconds_bucket:rate5m{namespace="my-ns", job="querier", operation="Shipper.Query", le="1"}'
        values: '0+10x20'
      - series: 'job_le_namespace_operation:loki_boltdb_shipper_request_duration_seconds_bucket:rate5m{namespace="my-ns", job="querier", operation="Shipper.Query", le="5"}'
        values: '0+50x20'
      - series: 'job_le_namespace_operation:loki_boltdb_shipper_request_duration_seconds_bucket:rate5m{namespace="my-ns", job="querier", operation="Shipper.Query", le="10"}'
        values: '0+100x20'
      - series: 'job_le_namespace_operation:loki_boltdb_shipper_request_duration_seconds_bucket:rate5m{namespace="my-ns", job="querier", operation="Shipper.Query", le="+Inf"}'
        values: '0+100x20'

      - series: 'loki_logql_querystats_latency_seconds_bucket{namespace="my-ns", job="querier", route="my-route", le="1"}'
        values: '0x20'
      - series: 'loki_logql_querystats_latency_seconds_bucket{namespace="my-ns", job="querier", route="my-route", le="30"}'
        values: '0+10x20'
      - series: 'loki_logql_querystats_latency_seconds_bucket{namespace="my-ns", job="querier", route="my-route", le="60"}'
        values: '0+100x20'
      - series: 'loki_logql_querystats_latency_seconds_bucket{namespace="my-ns", job="querier", route="my-route", le="+Inf"}'
        values: '0+100x20'

      - series: 'loki_discarded_samples_total{namespace="my-ns", tenant="application", reason="line_too_long"}'
        values: '0x5 0+120x25 3000'

      - series: 'lokistack_status_condition{stack_name="mystack", stack_namespace="my-ns", condition="Ready", status="false"}'
        values: '1+0x25'

      - series: 'loki_ingester_chunks_flush_failures_total{namespace="my-ns", pod="ingester-0"}'
        values: '0+25x20'
      - series: 'loki_ingester_chunks_flush_requests_total{namespace="my-ns", pod="ingester-0"}'
        values: '0+100x20'

      - series: 'lokistack_info{stack_namespace="my-ns",stack_name="mystack",size="1x.small"}'
        values: '1+0x5'
      - series: 'lokistack_storage_info{stack_namespace="my-ns",stack_name="mystack",size="1x.small",backend_type="s3",credential_mode="static"}'
        values: '1+0x5'
      - series: 'lokistack_storage_schema_version{stack_namespace="my-ns",stack_name="mystack",size="1x.small",version="v12",effective_date="2023-01-01"}'
        values: '1+0x5'
      - series: 'lokistack_storage_schema_version{stack_namespace="my-ns",stack_name="mystack",size="1x.small",version="v13",effective_date="2024-06-01"}'
        values: '1+0x5'
      - series: 'lokistack_global_ingestion_rate_limit_mb{stack_namespace="my-ns",stack_name="mystack",size="1x.small"}'
        values: '100+0x5'
      - series: 'lokistack_component_replicas{stack_namespace="my-ns",stack_name="mystack",size="1x.medium",component="ingester"}'
        values: '5+0x5'

      # Ingester container metrics for actual resource consumption
      # 2 ingester replicas, 0.5 CPU cores each, 2GB memory each
      - series: 'container_cpu_usage_seconds_total{namespace="my-ns",pod="mystack-ingester-0",container="loki-ingester"}'
        values: '0+30x5'
      - series: 'container_cpu_usage_seconds_total{namespace="my-ns",pod="mystack-ingester-1",container="loki-ingester"}'
        values: '0+30x5'
      - series: 'container_memory_working_set_bytes{namespace="my-ns",pod="mystack-ingester-0",container="loki-ingester"}'
        values: '2147483648+0x5'
      - series: 'container_memory_working_set_bytes{namespace="my-ns",pod="mystack-ingester-1",container="loki-ingester"}'
        values: '2147483648+0x5'

      # Ingestion rate metrics
      # Stack1: receiving 80 MB/s, discarding 5 MB/s = 75 MB/s net
      - series: 'loki_distributor_bytes_received_total{namespace="my-ns",pod="mystack1-distributor-0",container="loki-distributor"}'
        values: '0+5033164800x5'
      - series: 'loki_discarded_bytes_total{namespace="my-ns",pod="mystack1-distributor-0",container="loki-distributor"}'
        values: '0+314572800x5'
      # Stack2: receiving 90 MB/s, discarding 5 MB/s = 85 MB/s net
      - series: 'loki_distributor_bytes_received_total{namespace="my-ns",pod="mystack2-distributor-0",container="loki-distributor"}'
        values: '0+5662310400x5'
      - series: 'loki_discarded_bytes_total{namespace="my-ns",pod="mystack2-distributor-0",container="loki-distributor"}'
        values: '0+314572800x5'

    alert_rule_test:
      - eval_time: 16m
        alertname: LokiRequestErrors
        exp_alerts:
          - exp_labels:
              namespace: my-ns
              job: ingester
              route: my-route
              severity: critical
            exp_annotations:
              summary: "At least 10% of requests are responded by 5xx server errors."
              description: "ingester my-route is experiencing 20.48% errors."
              runbook_url: "[[ .RunbookURL ]]#Loki-Request-Errors"
      - eval_time: 16m
        alertname: LokiStackWriteRequestErrors
        exp_alerts:
          - exp_labels:
              namespace: my-ns
              job: gateway
              severity: critical
            exp_annotations:
              summary: "At least 10% of write requests to the lokistack-gateway are responded with 5xx server errors."
              description: "25.76% of write requests from gateway in my-ns are returned with server errors."
              runbook_url: "[[ .RunbookURL ]]#LokiStack-Write-Request-Errors"
      - eval_time: 16m
        alertname: LokiStackReadRequestErrors
        exp_alerts:
          - exp_labels:
              namespace: my-ns
              job: gateway
              severity: critical
            exp_annotations:
              summary: "At least 10% of query requests to the lokistack-gateway are responded with 5xx server errors."
              description: "25.76% of query requests from gateway in my-ns are returned with server errors."
              runbook_url: "[[ .RunbookURL ]]#LokiStack-Read-Request-Errors"
      - eval_time: 10m
        alertname: LokiRequestPanics
        exp_alerts:
          - exp_labels:
              namespace: my-ns
              job: ingester
              severity: critical
            exp_annotations:
              summary: "A panic was triggered."
              description: "ingester is experiencing an increase of 2 panics."
              runbook_url: "[[ .RunbookURL ]]#Loki-Request-Panics"
      - eval_time: 16m
        alertname: LokiRequestLatency
        exp_alerts:
          - exp_labels:
              namespace: my-ns
              job: ingester
              route: my-route
              severity: critical
            exp_annotations:
              summary: "The 99th percentile is experiencing high latency (higher than 5 seconds)."
              description: "ingester my-route is experiencing 9.90s 99th percentile latency."
              runbook_url: "[[ .RunbookURL ]]#Loki-Request-Latency"
      - eval_time: 16m
        alertname: LokiTenantRateLimit
        exp_alerts:
          - exp_labels:
              namespace: my-ns
              job: ingester
              route: my-route
              severity: warning
            exp_annotations:
              summary: "At least 10% of requests are responded with the rate limit error code."
              description: "ingester my-route is experiencing 429 errors."
              runbook_url: "[[ .RunbookURL ]]#Loki-Tenant-Rate-Limit"
      - eval_time: 16m
        alertname: LokiStorageSlowWrite
        exp_alerts:
          - exp_labels:
              namespace: my-ns
              job: ingester
              severity: warning
            exp_annotations:
              summary: "The storage path is experiencing slow write response rates."
              description: "The storage path is experiencing slow write response rates."
              runbook_url: "[[ .RunbookURL ]]#Loki-Storage-Slow-Write"
      - eval_time: 16m
        alertname: LokiStorageSlowRead
        exp_alerts:
          - exp_labels:
              namespace: my-ns
              job: querier
              severity: warning
            exp_annotations:
              summary: "The storage path is experiencing slow read response rates."
              description: "The storage path is experiencing slow read response rates."
              runbook_url: "[[ .RunbookURL ]]#Loki-Storage-Slow-Read"
      - eval_time: 16m
        alertname: LokiWritePathHighLoad
        exp_alerts:
          - exp_labels:
              namespace: my-ns
              job: ingester
              severity: warning
            exp_annotations:
              summary: "The write path is experiencing high load, causing backpressure storage flushing."
              description: "The write path is experiencing high load."
              runbook_url: "[[ .RunbookURL ]]#Loki-Write-Path-High-Load"
      - eval_time: 16m
        alertname: LokiReadPathHighLoad
        exp_alerts:
          - exp_labels:
              namespace: my-ns
              job: querier
              severity: warning
            exp_annotations:
              summary: "The read path has high volume of queries, causing longer response times."
              description: "The read path is experiencing high load."
              runbook_url: "[[ .RunbookURL ]]#Loki-Read-Path-High-Load"
      - eval_time: 22m
        alertname: LokiDiscardedSamplesWarning
        exp_alerts:
          - exp_labels:
              namespace: my-ns
              tenant: application
              severity: warning
              reason: line_too_long
            exp_annotations:
              description: |-
                Loki in namespace my-ns is discarding samples in the "application" tenant during ingestion.
                Samples are discarded because of "line_too_long" at a rate of 2 samples per second.
              summary: Loki is discarding samples during ingestion because they fail validation.
              runbook_url: "[[ .RunbookURL]]#Loki-Discarded-Samples-Warning"
      - eval_time: 16m
        alertname: LokistackComponentsNotReadyWarning
        exp_alerts:
          - exp_labels:
              namespace: my-ns
              stack_name: mystack
              severity: warning
            exp_annotations:
              description: 'The LokiStack "mystack" in namespace "my-ns" has components that are not ready.'
              summary: "One or more LokiStack components are not ready."
              runbook_url: "[[ .RunbookURL ]]#Lokistack-Components-Not-Ready-Warning"
      - eval_time: 16m
        alertname: LokiIngesterFlushFailureRateCritical
        exp_alerts:
          - exp_labels:
              namespace: my-ns
              pod: ingester-0
              severity: critical
            exp_annotations:
              summary: "Loki ingester has critical flush failure rate"
              description: |
                Loki ingester ingester-0 in the namespace my-ns has a critical flush failure rate of
                25% over the last 5 minutes. This requires immediate attention as data is
                not being flushed to the storage. Validate if the storage configuration is still valid and if the storage is
                still reachable. Current failure rate: 25% Threshold: 20%

    promql_expr_test:
      - eval_time: 5m
        expr: loki_operator:lokistack_info:count
        exp_samples:
          - labels: 'loki_operator:lokistack_info:count{size="1x.small"}'
            value: 1
      - eval_time: 5m
        expr: loki_operator:lokistack_storage_info:count
        exp_samples:
          - labels: 'loki_operator:lokistack_storage_info:count{backend_type="s3",credential_mode="static"}'
            value: 1
      - eval_time: 5m
        expr: loki_operator:lokistack_storage_schema_version:count
        exp_samples:
          - labels: 'loki_operator:lokistack_storage_schema_version:count{version="v12"}'
            value: 1
          - labels: 'loki_operator:lokistack_storage_schema_version:count{version="v13"}'
            value: 1
      - eval_time: 5m
        expr: loki_operator:lokistack_component_custom_replicas:count
        exp_samples:
          - labels: 'loki_operator:lokistack_component_custom_replicas:count{component="ingester"}'
            value: 1
      - eval_time: 5m
        expr: loki_operator:lokistack_global_ingestion_rate_limit_mb:avg
        exp_samples:
          - labels: 'loki_operator:lokistack_global_ingestion_rate_limit_mb:avg{}'
            value: 100
      - eval_time: 5m
        expr: loki_operator:lokistack_ingester_cpu_cores:sum
        exp_samples:
          - labels: 'loki_operator:lokistack_ingester_cpu_cores:sum{stack_namespace="my-ns",stack_name="mystack"}'
            value: 1
      - eval_time: 5m
        expr: loki_operator:lokistack_ingester_memory_working_set_bytes:sum
        exp_samples:
          - labels: 'loki_operator:lokistack_ingester_memory_working_set_bytes:sum{stack_namespace="my-ns",stack_name="mystack"}'
            value: 4294967296
      - eval_time: 5m
        expr: loki_operator:lokistack_ingestion_rate_mb_per_second:sum
        exp_samples:
          - labels: 'loki_operator:lokistack_ingestion_rate_mb_per_second:sum{stack_namespace="my-ns",stack_name="mystack1"}'
            value: 75
          - labels: 'loki_operator:lokistack_ingestion_rate_mb_per_second:sum{stack_namespace="my-ns",stack_name="mystack2"}'
            value: 85
