name: operator build

on:
  push:
    paths:
      - 'operator/**'
    branches: [ main ]
  pull_request:
    paths:
      - 'operator/**'

permissions:
  contents: read

jobs:
  docs:
    name: docs
    runs-on: ubuntu-latest
    permissions:
      contents: "read"
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        persist-credentials: false
    - name: Set up Go 1.x
      uses: actions/setup-go@v6
      with:
        go-version-file: ./operator/go.mod
        cache-dependency-path: ./operator/go.sum
    - name: Check generated docs
      working-directory: ./operator
      run: |
        make docs/operator/api.md docs/operator/feature-gates.md
        git diff --exit-code

  lint:
    name: lint
    runs-on: ubuntu-latest
    permissions:
      contents: "read"
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        persist-credentials: false
    - name: Set up Go 1.x
      uses: actions/setup-go@v6
      with:
        go-version-file: ./operator/go.mod
        cache-dependency-path: ./operator/go.sum
    - name: Lint
      uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2
      with:
        version: v2.12.2
        args: --timeout=5m
        working-directory: ./operator
    - name: Check prometheus rules
      working-directory: ./operator
      run: make lint-prometheus

  build-manager:
    name: Build Manager
    runs-on: ubuntu-latest
    permissions:
      contents: "read"
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        persist-credentials: false
    - name: Set up Go 1.x
      uses: actions/setup-go@v6
      with:
        go-version-file: ./operator/go.mod
        cache-dependency-path: ./operator/go.sum
      id: go
    - name: Build Manager
      working-directory: ./operator
      run: |-
        make manager && git diff --exit-code

  build-broker:
    name: Build Broker
    runs-on: ubuntu-latest
    permissions:
      contents: "read"
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        persist-credentials: false
    - name: Set up Go 1.x
      uses: actions/setup-go@v6
      with:
        go-version-file: ./operator/go.mod
        cache-dependency-path: ./operator/go.sum
    - name: Build Broker
      working-directory: ./operator
      run: |-
        make bin/loki-broker && git diff --exit-code

  test:
    name: test
    runs-on: ubuntu-latest
    permissions:
      contents: "read"
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        persist-credentials: false
    - name: Set up Go 1.x
      uses: actions/setup-go@v6
      with:
        go-version-file: ./operator/go.mod
        cache-dependency-path: ./operator/go.sum
    - name: Run tests
      working-directory: ./operator
      run: go test ./...
    - name: Run prometheus rule tests
      working-directory: ./operator
      run: make test-unit-prometheus
