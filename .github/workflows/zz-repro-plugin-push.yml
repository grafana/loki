name: "repro plugin push GAR auth"

on:
  push:
    branches:
      - "jnewbigin/repro-plugin-push-401"

permissions:
  contents: "read"
  id-token: "write"

jobs:
  reproPluginPush:
    runs-on: "ubuntu-x64"
    env:
      DEV_PREFIX: "us-docker.pkg.dev/grafanalabs-dev/docker-loki-dev"
      REPO_PATH: "grafanalabs-dev/docker-loki-dev/plugin-auth-repro"
    steps:
    - name: "Set up QEMU"
      uses: "docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392"
    - name: "set up docker buildx"
      uses: "docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2"
    - name: "Login to GAR"
      uses: "grafana/shared-workflows/actions/login-to-gar@12c87e5aa323694c820c1ff3d8e47e8237e05136"
      with:
        registry: "us-docker.pkg.dev"
    - name: "build and create minimal plugin"
      run: |
        set -euxo pipefail
        root="$(mktemp -d)"
        mkdir -p "${root}/rootfs"
        cat > "${root}/config.json" <<'JSON'
        { "description": "repro", "entrypoint": ["/bin/true"],
          "interface": { "types": ["docker.volumedriver/1.0"], "socket": "repro.sock" } }
        JSON
        ref="${DEV_PREFIX}/plugin-auth-repro:test"
        docker plugin rm -f "${ref}" 2>/dev/null || true
        docker plugin create "${ref}" "${root}"
        echo "PLUGIN_REF=${ref}" >> "${GITHUB_ENV}"
    - name: "REPRO: plugin push with credential helper only (expect 401)"
      id: "repro"
      continue-on-error: true
      run: |
        set -euxo pipefail
        docker plugin push "${PLUGIN_REF}"
    - name: "candidate FIX: plugin push via static auth in isolated DOCKER_CONFIG"
      id: "fix"
      continue-on-error: true
      run: |
        set -euxo pipefail
        DOCKER_CONFIG="$(mktemp -d)"
        export DOCKER_CONFIG
        gcloud auth print-access-token \
          | docker login -u oauth2accesstoken --password-stdin us-docker.pkg.dev
        docker plugin push "${PLUGIN_REF}"
    - name: "DIAGNOSE: authenticated token-endpoint probe (repository vs plugin scope)"
      run: |
        set -uo pipefail
        token="$(gcloud auth print-access-token)"
        basic="$(printf 'oauth2accesstoken:%s' "${token}" | base64 -w0)"
        probe() {
          local scope="$1" desc="$2"
          local code
          code="$(curl -s -o /tmp/tok.out -w '%{http_code}' \
            -H "Authorization: Basic ${basic}" -G \
            --data-urlencode "service=us-docker.pkg.dev" \
            --data-urlencode "scope=${scope}" \
            "https://us-docker.pkg.dev/v2/token")"
          echo "[HTTP ${code}] ${desc}  (scope=${scope})"
        }
        echo "== authenticated (valid GCP token) =="
        probe "repository:${REPO_PATH}:pull,push"          "plain repository scope"
        probe "repository(plugin):${REPO_PATH}:pull,push"  "PLUGIN scope"
        echo "== does a token even come back for the plain scope? =="
        curl -s -H "Authorization: Basic ${basic}" -G \
          --data-urlencode "service=us-docker.pkg.dev" \
          --data-urlencode "scope=repository:${REPO_PATH}:pull,push" \
          "https://us-docker.pkg.dev/v2/token" | head -c 120; echo
