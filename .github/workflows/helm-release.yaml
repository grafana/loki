name: helm-release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'production/helm/loki/Chart.yaml'

permissions:
  contents: read

jobs:
  call-update-helm-repo:
    uses: grafana/helm-charts/.github/workflows/update-helm-repo.yaml@0cb44b98b41df1bc345376ac40897453fa88df93
    permissions:
      contents: "write"
      id-token: "write"
      packages: "write"
    with:
      github_app: loki-gh-app
      charts_dir: production/helm
      cr_configfile: production/helm/cr.yaml
      ct_configfile: production/helm/ct.yaml
      helm_tag_prefix: helm
