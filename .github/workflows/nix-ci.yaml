---
name: "Lint And Build Nix Flake"
on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "flake.nix"
      - "flake.lock"
      - "go.mod"
      - "nix/**"
      - .github/workflows/nix-ci.yaml

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-x64
    permissions:
      contents: "read"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - run: nix run --print-build-logs .#lint
  packages:
    runs-on: ubuntu-x64
    permissions:
      contents: "read"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - run: nix build --print-build-logs .#logcli
      - run: nix build --print-build-logs .#loki
      - run: nix build --print-build-logs .#loki-canary
