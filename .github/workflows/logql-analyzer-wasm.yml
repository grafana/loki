# Verifies that the LogQL analyzer WASM binary builds via the canonical
# `make loki-logql-analyzer-wasm` target, stays under the size budget, and
# answers a trivial query end-to-end.
#
# The same `make` target is used by grafana/website at docs-publish time to
# produce the binary that actually ships next to the analyzer docs page.
# This CI guards the source — the build artifact isn't committed.
name: LogQL Analyzer WASM

on:
  pull_request:
    paths:
      - 'cmd/logql-analyzer-wasm/**'
      - 'pkg/logqlanalyzer/**'
      - 'pkg/logql/log/**'
      - 'pkg/logql/syntax/**'
      - 'pkg/logqlmodel/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build, size check, smoke test
    runs-on: ubuntu-latest
    env:
      WASM_OUT: docs/sources/query/analyzer/logql-analyzer.wasm
      WASM_EXEC_JS: docs/sources/query/analyzer/wasm_exec.js
      # Hard cap on the wasm-opt'd binary. Bumping this should be a deliberate
      # decision after investigating what dep pulled the extra weight in.
      # See README/PR history for the import-chain refactors that got us here.
      WASM_SIZE_LIMIT_BYTES: 26214400  # 25 MiB
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install binaryen (wasm-opt)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y binaryen
          wasm-opt --version

      - name: Build WASM via `make loki-logql-analyzer-wasm`
        # Single source of truth: the same target a developer runs locally and
        # the one grafana/website invokes at docs-publish time. Produces both
        # $WASM_OUT and $WASM_EXEC_JS (gitignored).
        run: make loki-logql-analyzer-wasm

      - name: Check WASM size against 25 MiB cap
        run: |
          SIZE=$(stat -c%s "$WASM_OUT")
          LIMIT="$WASM_SIZE_LIMIT_BYTES"
          SIZE_MIB=$(awk -v s="$SIZE" 'BEGIN { printf "%.2f", s/1048576 }')
          LIMIT_MIB=$(awk -v l="$LIMIT" 'BEGIN { printf "%.0f", l/1048576 }')
          echo "WASM size: ${SIZE_MIB} MiB (limit: ${LIMIT_MIB} MiB)"
          if [ "$SIZE" -gt "$LIMIT" ]; then
            echo "::error file=cmd/logql-analyzer-wasm/main.go::WASM binary is ${SIZE_MIB} MiB, exceeds ${LIMIT_MIB} MiB cap. Investigate which import pulled the extra weight in; do not just raise the cap."
            exit 1
          fi

      - name: Smoke test (load WASM in Node, call analyzeLogQL)
        # Exercises the same wasm_exec.js that ships next to the binary, so
        # any drift between the runtime JS and the .wasm is caught here.
        # Inline Node polyfills (TextEncoder, crypto, performance) cover the
        # browser globals that wasm_exec.js expects. We deliberately don't
        # use $(go env GOROOT)/lib/wasm/wasm_exec_node.js — that file is a
        # standalone CLI runner, not a library.
        run: |
          cat > /tmp/smoke.js <<'NODE_EOF'
          'use strict';
          globalThis.require = require;
          globalThis.fs = require('fs');
          globalThis.path = require('path');
          globalThis.TextEncoder = require('util').TextEncoder;
          globalThis.TextDecoder = require('util').TextDecoder;
          globalThis.performance ??= require('perf_hooks').performance;
          globalThis.crypto ??= require('crypto');
          require(process.env.GITHUB_WORKSPACE + '/' + process.env.WASM_EXEC_JS);

          const wasmBytes = fs.readFileSync(process.env.WASM_OUT);
          const go = new Go();

          WebAssembly.instantiate(wasmBytes, go.importObject)
            .then((result) => {
              // go.run starts the Go runtime. analyzeLogQL is set synchronously
              // inside main() before main blocks on a channel, so it's
              // available immediately after go.run returns control.
              go.run(result.instance);

              if (typeof globalThis.analyzeLogQL !== 'function') {
                console.error('smoke FAIL: analyzeLogQL global not registered');
                process.exit(1);
              }

              // Exercise the parser + a logfmt pipeline stage on a single log line.
              const query = '{job="smoke"} | logfmt';
              const logs  = ['level=info msg=hello caller=ci'];
              const raw   = globalThis.analyzeLogQL(query, logs);

              if (typeof raw !== 'string') {
                console.error('smoke FAIL: expected JSON string, got', typeof raw);
                process.exit(1);
              }

              let parsed;
              try { parsed = JSON.parse(raw); }
              catch (e) {
                console.error('smoke FAIL: result not valid JSON:', e.message);
                console.error('raw output:', raw);
                process.exit(1);
              }

              if (parsed.error) {
                console.error('smoke FAIL: analyzer returned error:', parsed.error);
                process.exit(1);
              }

              // Verify the shape script.js consumes.
              const expectFields = ['stream_selector', 'stages', 'results'];
              for (const f of expectFields) {
                if (!(f in parsed)) {
                  console.error('smoke FAIL: missing field "' + f + '" in result');
                  console.error('got keys:', Object.keys(parsed));
                  process.exit(1);
                }
              }

              if (!Array.isArray(parsed.results) || parsed.results.length !== 1) {
                console.error('smoke FAIL: expected 1 result entry, got', parsed.results && parsed.results.length);
                process.exit(1);
              }

              if (!Array.isArray(parsed.stages) || parsed.stages.length === 0) {
                console.error('smoke FAIL: expected non-empty stages array');
                process.exit(1);
              }

              const firstResult = parsed.results[0];
              if (firstResult.origin_line !== logs[0]) {
                console.error('smoke FAIL: origin_line mismatch:', firstResult.origin_line);
                process.exit(1);
              }
              if (!Array.isArray(firstResult.stage_records) || firstResult.stage_records.length === 0) {
                console.error('smoke FAIL: missing stage_records');
                process.exit(1);
              }

              console.log('smoke OK:');
              console.log('  stream_selector:', parsed.stream_selector);
              console.log('  stages:         ', parsed.stages.join(' | '));
              console.log('  stage_records:  ', firstResult.stage_records.length);
              process.exit(0);
            })
            .catch((err) => {
              console.error('smoke FAIL: WASM instantiate/run failed:', err);
              process.exit(1);
            });
          NODE_EOF
          node /tmp/smoke.js
