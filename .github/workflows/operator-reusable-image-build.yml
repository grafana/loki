name: Build operator image
on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      dockerfile:
        required: true
        type: string
      tag:
        required: true
        type: string
      registry:
        required: true
        type: string
      organization:
        required: true
        type: string

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: "read"
      id-token: "write"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: "Login to GAR"
        if: ${{ inputs.registry == 'us-docker.pkg.dev' }}
        uses: "grafana/shared-workflows/actions/login-to-gar@12c87e5aa323694c820c1ff3d8e47e8237e05136"
        with:
          registry: "us-docker.pkg.dev"

      - name: "fetch openshift credentials from vault"
        if: ${{ inputs.registry == 'quay.io' }}
        uses: "grafana/shared-workflows/actions/get-vault-secrets@28361cdb22223e5f1e34358c86c20908e7248760"
        with:
          repo_secrets: |
            OPENSHIFT_USER=openshift-credentials:username
            OPENSHIFT_PASS=openshift-credentials:password

      - name: Login to Quay.io
        if: ${{ inputs.registry == 'quay.io' }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: quay.io
          logout: true
          username: ${{ env.OPENSHIFT_USER }}
          password: ${{ env.OPENSHIFT_PASS }}

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          # Context has to be inferred from the image name due to zizmor high warning:
          # > WARNING: may expand into attacker-controllable code
          context: ${{ inputs.image_name == 'loki-operator-bundle' && 'operator/bundle/openshift' || 'operator' }}
          file: ${{ inputs.dockerfile }}
          platforms: "linux/amd64,linux/arm64,linux/arm"
          push: true
          tags: ${{ inputs.registry }}/${{ inputs.organization }}/${{ inputs.image_name }}:${{ inputs.tag }}
