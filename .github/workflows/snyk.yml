name: Snyk Monitor Scanning
on:
 release:
   types: [published]
 push:
    branches:
      - 'main'
      - 'master'
      - 'release-[0-9]+.[0-9]+.x'
 workflow_dispatch:

permissions:
  contents: read

jobs:
  snyk-scan-ci:
    uses: 'grafana/security-github-actions/.github/workflows/snyk_monitor.yml@54446245a62e0407f5375e0bb4eb03087364df37 # main'
    permissions:
      contents: "read"
      id-token: "write"
      pull-requests: "write"
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
