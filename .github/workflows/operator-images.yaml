name: operator images

on:
  push:
    paths:
      - 'operator/**'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-grafana-operator:
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/operator-reusable-image-build.yml
    with:
      dockerfile: "operator/Dockerfile"
      registry: "us-docker.pkg.dev"
      organization: "grafanalabs-global/dockerhub-loki-prod-mirror"
      image_name: "loki-operator"
      tag: "latest"

  publish-openshift-operator:
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/operator-reusable-image-build.yml
    with:
      dockerfile: "operator/Dockerfile"
      registry: "quay.io"
      organization: "openshift-logging"
      image_name: "loki-operator"
      tag: "latest"

  publish-openshift-bundle:
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/operator-reusable-image-build.yml
    with:
      dockerfile: "operator/bundle/openshift/bundle.Dockerfile"
      registry: "quay.io"
      organization: "openshift-logging"
      image_name: "loki-operator-bundle"
      tag: "latest"

  publish-openshift-size-calculator:
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/operator-reusable-image-build.yml
    with:
      dockerfile: "operator/calculator.Dockerfile"
      registry: "quay.io"
      organization: "openshift-logging"
      image_name: "storage-size-calculator"
      tag: "latest"

  publish-openshift-passthrough-gateway:
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/operator-reusable-image-build.yml
    with:
      dockerfile: "operator/passthrough-gateway.Dockerfile"
      registry: "quay.io"
      organization: "openshift-logging"
      image_name: "passthrough-gateway"
      tag: "latest"
