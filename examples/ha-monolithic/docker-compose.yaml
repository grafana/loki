# =============================================================================
# Loki HA Monolithic – Docker Compose
# =============================================================================
# Services
#   minio            – S3-compatible object storage (chunks + ruler buckets)
#   minio-init       – one-shot container that creates required MinIO buckets
#   loki-1/2/3       – Loki single-binary replicas (target=all), RF=3
#   nginx            – reverse proxy / load balancer in front of Loki
#
# Usage
#   docker compose up -d
# =============================================================================

name: loki-ha-monolithic

x-loki-common: &loki-common
  image: grafana/loki:3.7.2
  command:
    [
      "-config.file=/etc/loki/loki.yaml",
      "-runtime-config.file=/etc/loki/overrides.yaml",
      "-config.expand-env=true",
      "-target=all",
    ]
  depends_on:
    minio-init:
      condition: service_completed_successfully
  networks:
    - loki
  healthcheck:
    test: ["CMD", "/usr/bin/loki", "-health"]
    interval: 10s
    timeout: 5s
    retries: 10
    start_period: 30s

services:
  minio:
    image: pgsty/minio:latest
    entrypoint: ["minio", "server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: loki
      MINIO_ROOT_PASSWORD: supersecret
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # MinIO web console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - loki

  minio-init:
    image: pgsty/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set minio http://minio:9000 loki supersecret &&
        mc mb --ignore-existing minio/loki-chunks &&
        mc mb --ignore-existing minio/loki-ruler &&
        echo 'Buckets created.'
      "
    networks:
      - loki

  loki-1:
    <<: *loki-common
    container_name: loki-1
    hostname: loki-1
    environment:
      LOKI_INSTANCE_ID: loki-1
      COMPACTOR_MODE: main
    volumes:
      - ./config:/etc/loki:ro
      - loki-1-data:/loki

  loki-2:
    <<: *loki-common
    container_name: loki-2
    hostname: loki-2
    environment:
      LOKI_INSTANCE_ID: loki-2
    volumes:
      - ./config:/etc/loki:ro
      - loki-2-data:/loki

  loki-3:
    <<: *loki-common
    container_name: loki-3
    hostname: loki-3
    environment:
      LOKI_INSTANCE_ID: loki-3
    volumes:
      - ./config:/etc/loki:ro
      - loki-3-data:/loki

  nginx:
    image: nginx:alpine
    container_name: nginx
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "3100:3100"
    depends_on:
      - loki-1
      - loki-2
      - loki-3
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/nginx-health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - loki

volumes:
  minio-data:
  loki-1-data:
  loki-2-data:
  loki-3-data:

networks:
  loki:
