auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  http_server_read_timeout: 300s
  http_server_write_timeout: 300s
  http_server_idle_timeout: 120s
  log_level: info

frontend:
  # TLS certificate-based authorization settings
  authz_enabled: true
  authz_config_path: /path/to/config.json
  authz_reload_interval: 5m
  
  # Query handling settings
  compress_responses: true
  log_queries_longer_than: 10s
  max_body_size: 10485760  # 10MB
  query_stats_enabled: true
  
  # Downstream configuration
  downstream_url: ""
  
  # Frontend scheduler configuration
  scheduler_address: localhost:9095
  scheduler_dns_lookup_period: 10s
  scheduler_worker_concurrency: 5
  graceful_shutdown_timeout: 5m
  
  # Instance configuration for frontend v2
  address: ""  # Auto-detected from network interfaces
  instance_interface_names:
    - eth0
    - en0

# Limits configuration
limits_config:
  max_query_parallelism: 14
  max_query_length: 12000h
  max_query_lookback: 2160h  # 90 days
  max_cache_freshness_per_query: 10m
  split_queries_by_interval: 30m
  # Disable structured metadata to work with boltdb-shipper and schema v11
  allow_structured_metadata: false

# Schema configuration
schema_config:
  configs:
    - from: 2020-07-01
      store: boltdb-shipper
      object_store: filesystem
      schema: v11
      index:
        prefix: index_
        period: 24h

# Storage configuration
storage_config:
  boltdb_shipper:
    active_index_directory: /tmp/loki/index
    cache_location: /tmp/loki/index_cache
    cache_ttl: 24h
  filesystem:
    directory: /tmp/loki/chunks

# Query range configuration
query_range:
  align_queries_with_step: true
  cache_results: true
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100
        ttl: 24h

# Runtime configuration
runtime_config:
  file: /tmp/loki/runtime.yaml

# Table manager configuration
table_manager:
  retention_deletes_enabled: false
  retention_period: 0s

# Compactor configuration
compactor:
  working_directory: /tmp/loki/compactor
  compaction_interval: 10m