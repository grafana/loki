networks:
  loki:

volumes:
  prometheus:
  grafana:
  alertmanager:
  loki:
  minio:

x-loki-common: &loki-common
  image: grafana/loki:3.7.3@sha256:70b9f699fc9bb868b62f1cfd4f787dfa50242f1fd92e6089787d5d7daea75fe8
  volumes:
    - ./config:/etc/loki/
    - loki:/loki
  # only needed for interactive debugging with dlv
  # cap_add:
  #   - SYS_PTRACE
  # security_opt:
  #   - apparmor=unconfined
  ports:
    - "3100"
    - "9095"
    - "7946"
    # uncomment to use interactive debugging
    # - "40000-40002:40000" # makes the replicas available on ports 40000, 40001, 40002
  command:
    - "-target=all"
    - "-config.file=/etc/loki/loki.yaml"
    - ""
  networks:
    - loki
  restart: always
  healthcheck:
    test: ["CMD", "/usr/bin/loki", "-health"]
    start_period: 30s
    interval: 30s
    timeout: 10s
    retries: 3

services:
  grafana:
    image: grafana/grafana:13.1.0@sha256:121a7a9ece6dc10b969f1f96eed64b4f07dfac0d0b8abc070f7cb83bbde86f63
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
    volumes:
      - ./config/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yml
      - grafana:/var/lib/grafana
    networks:
      - loki

  prometheus:
    image: prom/prometheus:v3.12.0@sha256:69f5241418838263316593f7274a304b095c40bcf22e57272865da91bd60a8ac
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yaml:/etc/prometheus/prometheus.yml
      - prometheus:/prometheus
    command:
      [
        "--log.level=debug",
        "--config.file=/etc/prometheus/prometheus.yml",
        "--enable-feature=remote-write-receiver",
        "--query.lookback-delta=30s",
      ]
    networks:
      - loki

  # for testing purposes only, disable in production
  log-generator:
    image: mingrammer/flog
    platform: linux/amd64
    command:
      - --loop
      - --format=json
      - --number=10 # number of log lines to generate per second
      - --delay=100ms # delay between log lines
      - --output=/var/log/generated-logs.txt
      - --overwrite
      - --type=log
    volumes:
      - ./logs/:/var/log/

  # TODO: Replace with Alloy
  promtail:
    image: grafana/promtail:latest
    volumes:
      - ./logs/:/var/log/
      - ./config:/etc/promtail/
    ports:
      - 9080
    command: -config.file=/etc/promtail/promtail.yaml
    networks:
      - loki

  minio:
    image: minio/minio
    entrypoint:
      - sh
      - -euc
      - |
        mkdir -p /data/loki-data && \
        mkdir -p /data/loki-ruler &&
        minio server --address "0.0.0.0:9000" --console-address "0.0.0.0:9001" /data
    environment:
      - MINIO_ROOT_USER=loki
      - MINIO_ROOT_PASSWORD=supersecret
      - MINIO_PROMETHEUS_AUTH_TYPE=public
      - MINIO_UPDATE=off
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio:/data
    networks:
      - loki

  gateway:
    image: nginx:latest
    restart: always
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "3100:3100"
    networks:
      - loki

  loki-monolithic:
    <<: *loki-common
    deploy:
      mode: replicated
      replicas: 3

  loki-monolithic-compactor:
    <<: *loki-common
    environment:
      LOKI_COMPACTOR_MODE: main
    deploy:
      mode: replicated
      replicas: 1

  # alertmanager to enable receiving alerts
  alertmanager:
    image: prom/alertmanager:v0.33.1@sha256:9e082985f56f4c8c9f724e18f2288c6708f472e56a5286b8863d080434ea065d
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - "./config:/config"
      - alertmanager:/data
    command: --config.file=/config/alertmanager.yml --log.level=debug
    networks:
      - loki
