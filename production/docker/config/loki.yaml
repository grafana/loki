auth_enabled: true

server:
  http_listen_address: 0.0.0.0
  grpc_listen_address: 0.0.0.0
  http_listen_port: 3100
  grpc_listen_port: 9095
  log_level: info

common:
  path_prefix: /loki
  replication_factor: 3
  compactor_grpc_address: loki-monolithic-compactor:9095
  ring:
    heartbeat_period: 1m
    heartbeat_timeout: 5m
    kvstore:
      store: memberlist

storage_config:
  aws:
    endpoint: minio:9000
    insecure: true
    bucketnames: loki-data
    access_key_id: loki
    secret_access_key: supersecret
    s3forcepathstyle: true

memberlist:
  join_members:
    - "loki-monolithic"
    - "loki-monolithic-compactor"
  bind_addr: ["0.0.0.0"]
  bind_port: 7946
  cluster_label: loki-ha-monolithic
  cluster_label_verification_disabled: false

ingester:
  lifecycler:
    final_sleep: 0s
  chunk_idle_period: 1m
  wal:
    enabled: true
    dir: /loki/wal
  max_chunk_age: 1m
  chunk_retain_period: 30s
  chunk_encoding: snappy
  chunk_target_size: 1.572864e+06
  chunk_block_size: 262144
  flush_op_timeout: 10s

ruler:
  enable_api: true
  enable_sharding: true
  wal:
    dir: /loki/ruler-wal
  evaluation:
    mode: remote
    query_frontend:
      address: dns:///loki:9095
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/prom-rules
  remote_write:
    enabled: true
    clients:
      local:
        url: http://prometheus:9090/api/v1/write
        queue_config:
          # send immediately as soon as a sample is generated
          capacity: 1
          batch_send_deadline: 0s

schema_config:
  configs:
    - from: 2024-03-29
      store: tsdb
      object_store: s3
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  max_cache_freshness_per_query: "10m"
  reject_old_samples: true
  reject_old_samples_max_age: 30m
  ingestion_rate_mb: 100
  ingestion_burst_size_mb: 20
  split_queries_by_interval: 15m
  volume_enabled: true
  retention_period: 336h

query_range:
  align_queries_with_step: true
  max_retries: 5
  parallelise_shardable_queries: true
  cache_results: true

frontend:
  log_queries_longer_than: 5s
  compress_responses: true
  max_outstanding_per_tenant: 2048

query_scheduler:
  max_outstanding_requests_per_tenant: 1024

compactor:
  working_directory: /loki/compactor
  horizontal_scaling_mode: ${LOKI_COMPACTOR_MODE:-worker}
  apply_retention_interval: 1h
  compaction_interval: 5m
  retention_enabled: true
  delete_request_store: s3
