syntax = "proto3";

package protos;

import "wiresmith/options.proto";
import "pkg/logproto/bloomgateway.proto";

option go_package = "protos";

// Drop the per-message presence bitmap: gogoproto nullable=false parity
// (see WIRESMITH_MIGRATION.md).
option (wiresmith.options.no_presence_all) = true;

// FPBounds is identical to the definition in `pkg/storage/bloom/v1/bounds.FingerprintBounds`
// which ensures we can cast between them without allocations.
// TODO(salvacorts): Reuse from `pkg/logproto/indexgateway.proto`
message ProtoFingerprintBounds {
  uint64 min = 1 [
    (wiresmith.options.casttype) = "github.com/prometheus/common/model.Fingerprint",
    (wiresmith.options.jsontag) = "min"
  ];
  uint64 max = 2 [
    (wiresmith.options.casttype) = "github.com/prometheus/common/model.Fingerprint",
    (wiresmith.options.jsontag) = "max"
  ];
}

message DayTable {
  int64 dayTimestampMS = 1;
  string prefix = 2;
}

message ProtoSeries {
  uint64 fingerprint = 1;
  repeated logproto.ShortRef chunks = 2 [(wiresmith.options.pointer) = true];
}

message ProtoGapWithBlocks {
  ProtoFingerprintBounds bounds = 1 [
    (wiresmith.options.jsontag) = "bounds"
  ];
  repeated ProtoSeries series = 2 [(wiresmith.options.pointer) = true];
  repeated string blockRef = 3;
}

// TODO: Define BlockRef and SingleTenantTSDBIdentifier as messages so we can use them right away
//       instead of unmarshaling them from strings or doing unsafe casts.
message ProtoTask {
  string id = 1;
  DayTable table = 2 [
    (wiresmith.options.jsontag) = "table"
  ];
  string tenant = 3;
  ProtoFingerprintBounds bounds = 4 [
    (wiresmith.options.jsontag) = "bounds"
  ];
  string tsdb = 5;
  repeated ProtoGapWithBlocks gaps = 6 [(wiresmith.options.pointer) = true];
}

message ProtoMeta {
  string metaRef = 1;
  repeated string sourcesTSDBs = 2;
  repeated string blockRefs = 3;
}

message ProtoTaskResult {
  string taskID = 1;
  string error = 2;
  repeated ProtoMeta createdMetas = 3 [(wiresmith.options.pointer) = true];
}
