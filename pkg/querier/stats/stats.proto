syntax = "proto3";

package stats;

import "wiresmith/options.proto";
import "google/protobuf/duration.proto";

option go_package = "github.com/grafana/loki/v3/pkg/querier/stats";

// Drop the per-message presence bitmap: gogoproto nullable=false parity.
// The exported XXX_fieldsPresent field would otherwise leak into
// encoding/json output (it carries no json:"-" tag) and break
// reflect.DeepEqual between literals and decoded values.
option (wiresmith.options.no_presence_all) = true;

message Stats {
  // The sum of all wall time spent in the querier to execute the query.
  google.protobuf.Duration wall_time = 1 [(wiresmith.options.stdduration) = true];
  // The number of series fetched for the query
  uint64 fetched_series_count = 2;
  // The number of bytes of the chunks fetched for the query
  uint64 fetched_chunk_bytes = 3;
}
