syntax = "proto3";

package queryrange;

import "github.com/gogo/googleapis/google/rpc/status.proto";
import "wiresmith/options.proto";
import "google/protobuf/timestamp.proto";
import "pkg/logproto/indexgateway.proto";
import "pkg/logproto/logproto.proto";
import "pkg/logproto/pattern.proto";
import "pkg/logproto/sketch.proto";
import "pkg/logqlmodel/stats/stats.proto";
import "pkg/push/push.proto";
import "pkg/querier/queryrange/queryrangebase/definitions/definitions.proto";
import "pkg/querier/queryrange/queryrangebase/queryrange.proto";
import "pkg/storage/chunk/cache/resultscache/types.proto";

option go_package = "github.com/grafana/loki/v3/pkg/querier/queryrange";

// Drop the per-message presence bitmap: gogoproto nullable=false parity
// (see WIRESMITH_MIGRATION.md).
option (wiresmith.options.no_presence_all) = true;

message LokiRequest {
  string query = 1; // mark as reserved once we've fully migrated to plan.
  uint32 limit = 2;
  int64 step = 3;
  int64 interval = 9;
  google.protobuf.Timestamp startTs = 4 [(wiresmith.options.stdtime) = true];
  google.protobuf.Timestamp endTs = 5 [(wiresmith.options.stdtime) = true];
  logproto.Direction direction = 6;
  string path = 7;
  repeated string shards = 8 [(wiresmith.options.jsontag) = "shards"];
  Plan plan = 10 [(wiresmith.options.customtype) = "github.com/grafana/loki/v3/pkg/querier/plan.QueryPlan"];
  // If populated, these represent the chunk references that the querier should
  // use to fetch the data, plus any other chunks reported by ingesters.
  logproto.ChunkRefGroup storeChunks = 11 [
    (wiresmith.options.pointer) = true,
    (wiresmith.options.jsontag) = "storeChunks"
  ];
  resultscache.CachingOptions cachingOptions = 12;
}

message LokiInstantRequest {
  string query = 1;
  uint32 limit = 2;
  google.protobuf.Timestamp timeTs = 3 [(wiresmith.options.stdtime) = true];
  logproto.Direction direction = 4;
  string path = 5;
  repeated string shards = 6 [(wiresmith.options.jsontag) = "shards"];
  Plan plan = 7 [(wiresmith.options.customtype) = "github.com/grafana/loki/v3/pkg/querier/plan.QueryPlan"];
  // If populated, these represent the chunk references that the querier should
  // use to fetch the data, plus any other chunks reported by ingesters.
  logproto.ChunkRefGroup storeChunks = 8 [
    (wiresmith.options.pointer) = true,
    (wiresmith.options.jsontag) = "storeChunks"
  ];
  resultscache.CachingOptions cachingOptions = 9;
}

message Plan {
  bytes raw = 1;
}

message LokiResponse {
  string Status = 1 [(wiresmith.options.jsontag) = "status"];
  LokiData Data = 2 [
    (wiresmith.options.jsontag) = "data,omitempty"
  ];
  string ErrorType = 3 [(wiresmith.options.jsontag) = "errorType,omitempty"];
  string Error = 4 [(wiresmith.options.jsontag) = "error,omitempty"];
  logproto.Direction direction = 5;
  uint32 limit = 6;
  uint32 version = 7;
  stats.Result statistics = 8 [
    (wiresmith.options.jsontag) = "statistics"
  ];
  repeated definitions.PrometheusResponseHeader Headers = 9 [
    (wiresmith.options.pointer) = true,
    (wiresmith.options.jsontag) = "-"
  ];
  repeated string warnings = 10 [(wiresmith.options.jsontag) = "warnings,omitempty"];
}

message LokiSeriesRequest {
  repeated string match = 1;
  google.protobuf.Timestamp startTs = 2 [(wiresmith.options.stdtime) = true];
  google.protobuf.Timestamp endTs = 3 [(wiresmith.options.stdtime) = true];
  string path = 4;
  repeated string shards = 5 [(wiresmith.options.jsontag) = "shards"];
}

message LokiSeriesResponse {
  string Status = 1 [(wiresmith.options.jsontag) = "status"];
  repeated logproto.SeriesIdentifier Data = 2 [
    (wiresmith.options.jsontag) = "data,omitempty"
  ];
  uint32 version = 3;
  repeated definitions.PrometheusResponseHeader Headers = 4 [
    (wiresmith.options.pointer) = true,
    (wiresmith.options.jsontag) = "-"
  ];
  stats.Result statistics = 5 [
    (wiresmith.options.jsontag) = "statistics"
  ];
}

message LokiLabelNamesResponse {
  string Status = 1 [(wiresmith.options.jsontag) = "status"];
  repeated string Data = 2 [(wiresmith.options.jsontag) = "data,omitempty"];
  uint32 version = 3;
  repeated definitions.PrometheusResponseHeader Headers = 4 [
    (wiresmith.options.pointer) = true,
    (wiresmith.options.jsontag) = "-"
  ];
  stats.Result statistics = 5 [
    (wiresmith.options.jsontag) = "statistics"
  ];
}

message LokiData {
  string ResultType = 1 [(wiresmith.options.jsontag) = "resultType"];
  repeated logproto.StreamAdapter Result = 2 [
    (wiresmith.options.jsontag) = "result",
    (wiresmith.options.customtype) = "github.com/grafana/loki/pkg/push.Stream"
  ];
}

// LokiPromResponse wraps a Prometheus response with statistics.
message LokiPromResponse {
  queryrangebase.PrometheusResponse response = 1 [(wiresmith.options.pointer) = true];
  stats.Result statistics = 2;
}

message IndexStatsResponse {
  logproto.IndexStatsResponse response = 1 [(wiresmith.options.pointer) = true];
  repeated definitions.PrometheusResponseHeader Headers = 2 [
    (wiresmith.options.pointer) = true,
    (wiresmith.options.jsontag) = "-"
  ];
}

message VolumeResponse {
  logproto.VolumeResponse response = 1 [(wiresmith.options.pointer) = true];
  repeated definitions.PrometheusResponseHeader Headers = 2 [
    (wiresmith.options.pointer) = true,
    (wiresmith.options.jsontag) = "-"
  ];
}

message TopKSketchesResponse {
  logproto.TopKMatrix response = 1 [(wiresmith.options.pointer) = true];
  repeated definitions.PrometheusResponseHeader Headers = 2 [
    (wiresmith.options.pointer) = true,
    (wiresmith.options.jsontag) = "-"
  ];
  repeated string warnings = 3 [(wiresmith.options.jsontag) = "warnings,omitempty"];
  stats.Result statistics = 4;
}

message QuantileSketchResponse {
  logproto.QuantileSketchMatrix response = 1 [(wiresmith.options.pointer) = true];
  repeated definitions.PrometheusResponseHeader Headers = 2 [
    (wiresmith.options.pointer) = true,
    (wiresmith.options.jsontag) = "-"
  ];
  repeated string warnings = 3 [(wiresmith.options.jsontag) = "warnings,omitempty"];
  stats.Result statistics = 4;
}

message CountMinSketchResponse {
  logproto.CountMinSketchVector response = 1 [(wiresmith.options.pointer) = true];
  repeated definitions.PrometheusResponseHeader Headers = 2 [
    (wiresmith.options.pointer) = true,
    (wiresmith.options.jsontag) = "-"
  ];
  repeated string warnings = 3 [(wiresmith.options.jsontag) = "warnings,omitempty"];
  stats.Result statistics = 4;
}

message ShardsResponse {
  indexgatewaypb.ShardsResponse response = 1 [(wiresmith.options.pointer) = true];
  repeated definitions.PrometheusResponseHeader Headers = 2 [
    (wiresmith.options.pointer) = true,
    (wiresmith.options.jsontag) = "-"
  ];
}

message DetectedFieldsResponse {
  logproto.DetectedFieldsResponse response = 1 [(wiresmith.options.pointer) = true];
  repeated definitions.PrometheusResponseHeader Headers = 2 [
    (wiresmith.options.pointer) = true,
    (wiresmith.options.jsontag) = "-"
  ];
}

message QueryPatternsResponse {
  logproto.QueryPatternsResponse response = 1 [(wiresmith.options.pointer) = true];
  repeated definitions.PrometheusResponseHeader Headers = 2 [
    (wiresmith.options.pointer) = true,
    (wiresmith.options.jsontag) = "-"
  ];
}
message DetectedLabelsResponse {
  logproto.DetectedLabelsResponse response = 1 [(wiresmith.options.pointer) = true];
  repeated definitions.PrometheusResponseHeader Headers = 2 [
    (wiresmith.options.pointer) = true,
    (wiresmith.options.jsontag) = "-"
  ];
}

message QueryResponse {
  // RPCStatusAdapter bridges to the gogo-generated google.rpc.Status Go
  // type (vendored googleapis); wiresmith cannot embed messages generated
  // by another protobuf runtime.
  google.rpc.Status status = 1 [(wiresmith.options.customtype) = "RPCStatusAdapter"];
  oneof response {
    LokiSeriesResponse series = 2;
    LokiLabelNamesResponse labels = 3;
    IndexStatsResponse stats = 4;
    LokiPromResponse prom = 5;
    LokiResponse streams = 6;
    VolumeResponse volume = 7;
    TopKSketchesResponse topkSketches = 8;
    QuantileSketchResponse quantileSketches = 9;
    ShardsResponse shardsResponse = 10;
    DetectedFieldsResponse detectedFields = 11;
    QueryPatternsResponse patternsResponse = 12;
    DetectedLabelsResponse detectedLabels = 13;
    CountMinSketchResponse countMinSketches = 14;
  }
}

message QueryRequest {
  oneof request {
    LokiSeriesRequest series = 1;
    logproto.LabelRequest labels = 2;
    logproto.IndexStatsRequest stats = 3;
    LokiInstantRequest instant = 4;
    LokiRequest streams = 5;
    logproto.VolumeRequest volume = 6;
    indexgatewaypb.ShardsRequest shardsRequest = 8;
    logproto.DetectedFieldsRequest detectedFields = 9;
    logproto.QueryPatternsRequest patternsRequest = 10;
    logproto.DetectedLabelsRequest detectedLabels = 11;
  }
  map<string, string> metadata = 7;
}
