syntax = "proto3";

package queryrangebase;

import "wiresmith/options.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";
import "pkg/logproto/logproto.proto";
import "pkg/querier/queryrange/queryrangebase/definitions/definitions.proto";
import "pkg/storage/chunk/cache/resultscache/types.proto";

option go_package = "github.com/grafana/loki/v3/pkg/querier/queryrange/queryrangebase";

// Drop the per-message presence bitmap: gogoproto nullable=false parity
// (see WIRESMITH_MIGRATION.md).
option (wiresmith.options.no_presence_all) = true;

message PrometheusRequest {
  string path = 1;
  google.protobuf.Timestamp start = 2 [(wiresmith.options.stdtime) = true];
  google.protobuf.Timestamp end = 3 [(wiresmith.options.stdtime) = true];
  int64 step = 4;
  google.protobuf.Duration timeout = 5 [(wiresmith.options.stdduration) = true];
  string query = 6;
  resultscache.CachingOptions cachingOptions = 7;
  repeated definitions.PrometheusRequestHeader Headers = 8 [
    (wiresmith.options.pointer) = true,
    (wiresmith.options.jsontag) = "-"
  ];
}

message PrometheusResponse {
  string Status = 1 [(wiresmith.options.jsontag) = "status"];
  PrometheusData Data = 2 [
    (wiresmith.options.jsontag) = "data,omitempty"
  ];
  string ErrorType = 3 [(wiresmith.options.jsontag) = "errorType,omitempty"];
  string Error = 4 [(wiresmith.options.jsontag) = "error,omitempty"];
  repeated definitions.PrometheusResponseHeader Headers = 5 [
    (wiresmith.options.pointer) = true,
    (wiresmith.options.jsontag) = "-"
  ];
  repeated string Warnings = 6 [(wiresmith.options.jsontag) = "warnings,omitempty"];
}

message PrometheusData {
  string ResultType = 1 [(wiresmith.options.jsontag) = "resultType"];
  repeated SampleStream Result = 2 [
    (wiresmith.options.jsontag) = "result"
  ];
}

message SampleStream {
  repeated logproto.LegacyLabelPair labels = 1 [
    (wiresmith.options.jsontag) = "metric",
    (wiresmith.options.customtype) = "github.com/grafana/loki/v3/pkg/logproto.LabelAdapter"
  ];
  repeated logproto.LegacySample samples = 2 [
    (wiresmith.options.jsontag) = "values"
  ];
}
