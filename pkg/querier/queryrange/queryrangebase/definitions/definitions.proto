syntax = "proto3";

package definitions;

import "wiresmith/options.proto";

option go_package = "github.com/grafana/loki/v3/pkg/querier/queryrange/queryrangebase/definitions";

// Drop the per-message presence bitmap: gogoproto nullable=false parity
// (see WIRESMITH_MIGRATION.md).
option (wiresmith.options.no_presence_all) = true;

message PrometheusRequestHeader {
  string Name = 1 [(wiresmith.options.jsontag) = "-"];
  repeated string Values = 2 [(wiresmith.options.jsontag) = "-"];
}

message PrometheusResponseHeader {
  string Name = 1 [(wiresmith.options.jsontag) = "-"];
  repeated string Values = 2 [(wiresmith.options.jsontag) = "-"];
}
