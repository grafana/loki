syntax = "proto3";

package stats;

import "wiresmith/options.proto";

option go_package = "github.com/grafana/loki/v3/pkg/logqlmodel/stats";

// Result contains LogQL query statistics.
message Result {
  Summary summary = 1 [(wiresmith.options.jsontag) = "summary"];
  Querier querier = 2 [(wiresmith.options.jsontag) = "querier"];
  Ingester ingester = 3 [(wiresmith.options.jsontag) = "ingester"];
  Caches caches = 4 [(wiresmith.options.jsontag) = "cache"];
  Index index = 5 [(wiresmith.options.jsontag) = "index"];
}

message Caches {
  Cache chunk = 1 [(wiresmith.options.jsontag) = "chunk"];
  Cache index = 2 [(wiresmith.options.jsontag) = "index"];
  Cache result = 3 [(wiresmith.options.jsontag) = "result"];
  Cache statsResult = 4 [(wiresmith.options.jsontag) = "statsResult"];
  Cache volumeResult = 5 [(wiresmith.options.jsontag) = "volumeResult"];
  Cache seriesResult = 6 [(wiresmith.options.jsontag) = "seriesResult"];
  Cache labelResult = 7 [(wiresmith.options.jsontag) = "labelResult"];
  Cache instantMetricResult = 8 [(wiresmith.options.jsontag) = "instantMetricResult"];
  Cache logResult = 9 [(wiresmith.options.jsontag) = "logResult"];
  Cache taskResult = 10 [(wiresmith.options.jsontag) = "taskResult"];
}

// Summary is the summary of a query statistics.
message Summary {
  // Total bytes processed per second.
  int64 bytesProcessedPerSecond = 1 [(wiresmith.options.jsontag) = "bytesProcessedPerSecond"];
  // Total lines processed per second.
  int64 linesProcessedPerSecond = 2 [(wiresmith.options.jsontag) = "linesProcessedPerSecond"];
  // Total bytes processed. Includes structured metadata bytes.
  int64 totalBytesProcessed = 3 [(wiresmith.options.jsontag) = "totalBytesProcessed"];
  // Total lines processed.
  int64 totalLinesProcessed = 4 [(wiresmith.options.jsontag) = "totalLinesProcessed"];
  // Execution time in seconds.
  // In addition to internal calculations this is also returned by the HTTP API.
  // Grafana expects time values to be returned in seconds as float.
  double execTime = 5 [(wiresmith.options.jsontag) = "execTime"];
  // Queue time in seconds.
  // In addition to internal calculations this is also returned by the HTTP API.
  // Grafana expects time values to be returned in seconds as float.
  double queueTime = 6 [(wiresmith.options.jsontag) = "queueTime"];
  // Subqueries exists for backwards compatibility reasons and is deprecated. Do not use.
  // Instead use splits and shards
  int64 subqueries = 7 [(wiresmith.options.jsontag) = "subqueries"];
  // Total number of result entries returned
  int64 totalEntriesReturned = 8 [(wiresmith.options.jsontag) = "totalEntriesReturned"];
  // Total number of splits by time
  int64 splits = 9 [(wiresmith.options.jsontag) = "splits"];
  // Total number of shards
  int64 shards = 10 [(wiresmith.options.jsontag) = "shards"];
  // Total lines post query filtering
  int64 totalPostFilterLines = 11 [(wiresmith.options.jsontag) = "totalPostFilterLines"];
  // Total bytes processed of metadata.
  int64 totalStructuredMetadataBytesProcessed = 12 [(wiresmith.options.jsontag) = "totalStructuredMetadataBytesProcessed"];
  // Estimated bytes for this query reported by index stats before chunk reads.
  // This is useful to identify haystack-sized queries when index filtering makes
  // totalBytesProcessed appear much smaller.
  int64 estimatedQueryBytes = 13 [(wiresmith.options.jsontag) = "estimatedQueryBytes,omitempty"];
}

// Statistics from Index queries
// TODO(owen-d): include bytes.
// Needs some index methods added to return _sized_ chunk refs to know
message Index {
  // Total chunks
  int64 totalChunks = 1 [(wiresmith.options.jsontag) = "totalChunks"];
  // Post-filtered chunks
  int64 postFilterChunks = 2 [(wiresmith.options.jsontag) = "postFilterChunks"];
  // Nanosecond duration spent fetching shards
  int64 shardsDuration = 3 [(wiresmith.options.jsontag) = "shardsDuration"];
  // Indicates whether the query used blooms to filter chunks
  bool usedBloomFilters = 4 [(wiresmith.options.jsontag) = "usedBloomFilters"];
  // Total unique streams matched
  int64 totalStreams = 5 [(wiresmith.options.jsontag) = "totalStreams"];
  // Time spent fetching chunk refs from index in seconds.
  // In addition to internal calculations this is also returned by the HTTP API.
  // Grafana expects time values to be returned in seconds as float.
  double chunkRefsLookupTime = 6 [(wiresmith.options.jsontag) = "chunkRefsLookupTime"];
  // Time spent filtering chunks with bloom gateway in seconds.
  // In addition to internal calculations this is also returned by the HTTP API.
  // Grafana expects time values to be returned in seconds as float.
  double bloomFilterTime = 7 [(wiresmith.options.jsontag) = "bloomFilterTime"];
}

message Querier {
  Store store = 1 [(wiresmith.options.jsontag) = "store"];
  // Querier execution time in seconds.
  // Total time the querier spent executing the query. This is separate from execTime which tracks overall execution time.
  // Grafana expects time values to be returned in seconds as float.
  double querierExecTime = 2 [(wiresmith.options.jsontag) = "querierExecTime"];
}

message Ingester {
  // Total ingester reached for this query.
  int32 totalReached = 1 [(wiresmith.options.jsontag) = "totalReached"];
  // Total of chunks matched by the query from ingesters
  int64 totalChunksMatched = 2 [(wiresmith.options.jsontag) = "totalChunksMatched"];
  // Total of batches sent from ingesters.
  int64 totalBatches = 3 [(wiresmith.options.jsontag) = "totalBatches"];
  // Total lines sent by ingesters.
  int64 totalLinesSent = 4 [(wiresmith.options.jsontag) = "totalLinesSent"];

  Store store = 5 [(wiresmith.options.jsontag) = "store"];

  // Total time querier spent waiting on ingester gRPC Recv(), in seconds.
  // Omitted from JSON when zero for backwards compatibility.
  // Grafana expects time values to be returned in seconds as float
  double recvWaitTime = 6 [(wiresmith.options.jsontag) = "recvWaitTime,omitempty"];
}

message Store {
  // The total of chunk reference fetched from index.
  int64 totalChunksRef = 1 [(wiresmith.options.jsontag) = "totalChunksRef"];
  // Total number of chunks fetched.
  int64 totalChunksDownloaded = 2 [(wiresmith.options.jsontag) = "totalChunksDownloaded"];
  // Time spent fetching chunks in nanoseconds.
  int64 chunksDownloadTime = 3 [(wiresmith.options.jsontag) = "chunksDownloadTime"];
  // Whether the query referenced structured metadata
  bool queryReferencedStructured = 13 [(wiresmith.options.jsontag) = "queryReferencedStructuredMetadata"];
  // Whether the V2 engine was used for some or all of the query.
  bool queryUsedV2Engine = 14 [(wiresmith.options.jsontag) = "queryUsedV2Engine"];

  Chunk chunk = 4 [(wiresmith.options.jsontag) = "chunk"];

  // Time spent fetching chunk refs from index.
  int64 chunkRefsFetchTime = 5 [(wiresmith.options.jsontag) = "chunkRefsFetchTime"];

  // Time spent being blocked on congestion control.
  int64 congestionControlLatency = 6 [(wiresmith.options.jsontag) = "congestionControlLatency"];

  // Total number of lines filtered by pipeline wrapper.
  int64 pipelineWrapperFilteredLines = 7 [(wiresmith.options.jsontag) = "pipelineWrapperFilteredLines"];

  Dataobj dataobj = 8 [(wiresmith.options.jsontag) = "dataobj"];
}

message Dataobj {
  // Total number of rows decompressed from storage in the primary fill stage.
  int64 prePredicateDecompressedRows = 1 [(wiresmith.options.jsontag) = "prePredicateDecompressedRows"];
  // Total number of bytes decompressed from storage in the primary fill stage.
  int64 prePredicateDecompressedBytes = 2 [(wiresmith.options.jsontag) = "prePredicateDecompressedBytes"];
  // Total number of bytes decompressed from storage for structured metadata in the primary fill stage.
  int64 prePredicateDecompressedStructuredMetadataBytes = 3 [(wiresmith.options.jsontag) = "prePredicateDecompressedStructuredMetadataBytes"];

  // Total number of rows that passed the predicate
  int64 postPredicateRows = 4 [(wiresmith.options.jsontag) = "postPredicateRows"];
  // Number of additional bytes decompressed from storage in the secondary fill stage.
  int64 postPredicateDecompressedBytes = 5 [(wiresmith.options.jsontag) = "postPredicateDecompressedBytes"];
  // Total number of structured metadata bytes decompressed from storage in the secondary fill stage.
  int64 postPredicateStructuredMetadataBytes = 6 [(wiresmith.options.jsontag) = "postPredicateStructuredMetadataBytes"];

  // Total rows that passed the pipeline filter
  int64 postFilterRows = 7 [(wiresmith.options.jsontag) = "postFilterRows"];

  // Total pages scanned
  int64 pagesScanned = 8 [(wiresmith.options.jsontag) = "pagesScanned"];

  // Total pages downloaded
  int64 pagesDownloaded = 9 [(wiresmith.options.jsontag) = "pagesDownloaded"];

  // Total page bytes downloaded
  int64 pagesDownloadedBytes = 10 [(wiresmith.options.jsontag) = "pagesDownloadedBytes"];

  // Total requests to storage to fetch desired pages
  int64 pageBatches = 11 [(wiresmith.options.jsontag) = "pageBatches"];

  // Total possible rows in the data object
  int64 totalRowsAvailable = 12 [(wiresmith.options.jsontag) = "totalRowsAvailable"];

  // Time spent fetching page metadata or data from object storage in nanoseconds.
  int64 totalPageDownloadTime = 13 [(wiresmith.options.jsontag) = "totalPageDownloadTime"];

  // Total bytes transferred between tasks via scheduler streams (sources and sinks).
  int64 wireBytesTransferred = 14 [(wiresmith.options.jsontag) = "wireBytesTransferred"];
}

message Chunk {
  // Total bytes processed but was already in memory (found in the headchunk). Includes structured metadata bytes.
  int64 headChunkBytes = 4 [(wiresmith.options.jsontag) = "headChunkBytes"];
  // Total lines processed but was already in memory. (found in the headchunk)
  int64 headChunkLines = 5 [(wiresmith.options.jsontag) = "headChunkLines"];
  // Total bytes decompressed and processed from chunks. Includes structured metadata bytes.
  int64 decompressedBytes = 6 [(wiresmith.options.jsontag) = "decompressedBytes"];
  // Total lines decompressed and processed from chunks.
  int64 decompressedLines = 7 [(wiresmith.options.jsontag) = "decompressedLines"];
  // Total bytes of compressed chunks (blocks) processed.
  int64 compressedBytes = 8 [(wiresmith.options.jsontag) = "compressedBytes"];
  // Total duplicates found while processing.
  int64 totalDuplicates = 9 [(wiresmith.options.jsontag) = "totalDuplicates"];
  // Total lines post filtering
  int64 postFilterLines = 10 [(wiresmith.options.jsontag) = "postFilterLines"];
  // Total bytes processed for metadata but was already in memory. (found in the headchunk)
  int64 headChunkStructuredMetadataBytes = 11 [(wiresmith.options.jsontag) = "headChunkStructuredMetadataBytes"];
  // Total bytes of entries metadata decompressed and processed from chunks.
  int64 decompressedStructuredMetadataBytes = 12 [(wiresmith.options.jsontag) = "decompressedStructuredMetadataBytes"];
}

message Cache {
  int32 entriesFound = 1 [(wiresmith.options.jsontag) = "entriesFound"];
  int32 entriesRequested = 2 [(wiresmith.options.jsontag) = "entriesRequested"];
  int32 entriesStored = 3 [(wiresmith.options.jsontag) = "entriesStored"];
  int64 bytesReceived = 4 [(wiresmith.options.jsontag) = "bytesReceived"];
  int64 bytesSent = 5 [(wiresmith.options.jsontag) = "bytesSent"];
  int32 requests = 6 [(wiresmith.options.jsontag) = "requests"];
  int64 downloadTime = 7 [(wiresmith.options.jsontag) = "downloadTime"];
  int64 queryLengthServed = 8 [(wiresmith.options.jsontag) = "queryLengthServed"];
}
