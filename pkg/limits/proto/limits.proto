syntax = "proto3";

package proto;

import "wiresmith/options.proto";

// Drop the per-message presence bitmap: gogoproto nullable=false parity.
// The exported XXX_fieldsPresent field would otherwise leak into
// encoding/json output (it carries no json:"-" tag) and break
// reflect.DeepEqual between literals and decoded values.
option (wiresmith.options.no_presence_all) = true;

service IngestLimitsFrontend {
  rpc ExceedsLimits(ExceedsLimitsRequest) returns (ExceedsLimitsResponse) {}
  rpc UpdateRates(UpdateRatesRequest) returns (UpdateRatesResponse) {}
}

service IngestLimits {
  rpc ExceedsLimits(ExceedsLimitsRequest) returns (ExceedsLimitsResponse) {}
  rpc GetAssignedPartitions(GetAssignedPartitionsRequest) returns (GetAssignedPartitionsResponse) {}
  rpc UpdateRates(UpdateRatesRequest) returns (UpdateRatesResponse) {}
}

message ExceedsLimitsRequest {
  string tenant = 1;
  repeated StreamMetadata streams = 2 [(wiresmith.options.pointer) = true];
}

message ExceedsLimitsResponse {
  repeated ExceedsLimitsResult results = 1 [(wiresmith.options.pointer) = true];
}

message ExceedsLimitsResult {
  uint64 streamHash = 1;
  uint32 reason = 2;
}

message GetAssignedPartitionsRequest {}

message GetAssignedPartitionsResponse {
  map<int32, int64> assignedPartitions = 1;
}

message StreamMetadata {
  uint64 streamHash = 1;
  uint64 totalSize = 2;
  // The resolved ingestion policy for this stream if any. May be used to override some ingestion limits for this stream such as the max streams allowed.
  string ingestionPolicy = 3;
}

message StreamMetadataRecord {
  string zone = 1;
  string tenant = 2;
  StreamMetadata metadata = 3 [(wiresmith.options.pointer) = true];
}

message UpdateRatesRequest {
  string tenant = 1;
  repeated StreamMetadata streams = 2 [(wiresmith.options.pointer) = true];
}

message UpdateRatesResponse {
  repeated UpdateRatesResult results = 1 [(wiresmith.options.pointer) = true];
}

message UpdateRatesResult {
  uint64 streamHash = 1;
  uint64 rate = 2;
}
