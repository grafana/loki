syntax = "proto3";

package rules;

import "wiresmith/options.proto";
import "google/protobuf/any.proto";
import "google/protobuf/duration.proto";
import "pkg/logproto/logproto.proto";

option go_package = "github.com/grafana/loki/v3/pkg/ruler/rulespb";

// Drop the per-message presence bitmap: gogoproto nullable=false parity
// (see WIRESMITH_MIGRATION.md).
option (wiresmith.options.no_presence_all) = true;

// RuleGroupDesc is a proto representation of a rule group.
message RuleGroupDesc {
  reserved 5, 7, 8;
  string name = 1;
  string namespace = 2;
  google.protobuf.Duration interval = 3 [(wiresmith.options.stdduration) = true];
  repeated RuleDesc rules = 4 [(wiresmith.options.pointer) = true];
  string user = 6;
  // The options field can be used to extend Ruler functionality without
  // having to repeatedly redefine the proto description. It can also be leveraged
  // to create custom `ManagerOpts` based on rule configs which can then be passed
  // to the Prometheus Manager.
  // AnyAdapter bridges to the gogo-generated types.Any Go type.
  repeated google.protobuf.Any options = 9 [(wiresmith.options.customtype) = "AnyAdapter"];
  int64 limit = 10;
}

// RuleDesc is a proto representation of a Prometheus Rule
message RuleDesc {
  reserved 7 to 12;
  string expr = 1;
  string record = 2;
  string alert = 3;
  google.protobuf.Duration for = 4 [(wiresmith.options.stdduration) = true];
  repeated logproto.LegacyLabelPair labels = 5 [
    (wiresmith.options.customtype) = "github.com/grafana/loki/v3/pkg/logproto.LabelAdapter"
  ];
  repeated logproto.LegacyLabelPair annotations = 6 [
    (wiresmith.options.customtype) = "github.com/grafana/loki/v3/pkg/logproto.LabelAdapter"
  ];
}
