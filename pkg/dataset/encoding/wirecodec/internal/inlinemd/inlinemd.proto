syntax = "proto3";

package grafana.dataset.inline.v1;

import "pkg/dataset/encoding/wirecodec/internal/datasetmd/datasetmd.proto";

option go_package = "github.com/grafana/loki/v3/pkg/dataset/encoding/wirecodec/internal/inlinemd";

// Inline holds an inlined representation of a dataset, including its metadata
// and all of its buffers. As an Inline dataset can only be read in full, Inline
// should only be used for very small data sets.
message Inline {
  grafana.dataset.v1.Metadata metadata = 1;
  repeated Buffer buffers = 2;
}

// Buffer holds the data for a single buffer in an inlined dataset.
message Buffer {
  uint64 id = 1;
  bytes data = 2;
}
