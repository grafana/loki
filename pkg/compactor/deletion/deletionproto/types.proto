syntax = "proto3";

package deletionproto;

import "wiresmith/options.proto";

option go_package = "github.com/grafana/loki/v3/pkg/compactor/deletion/deletionproto";

// Drop the per-message presence bitmap: gogoproto nullable=false parity
// (see WIRESMITH_MIGRATION.md).
option (wiresmith.options.no_presence_all) = true;

message DeleteRequest {
  string requestID = 1 [(wiresmith.options.jsontag) = "request_id"];
  int64 startTime = 2 [
    (wiresmith.options.casttype) = "github.com/prometheus/common/model.Time",
    (wiresmith.options.jsontag) = "start_time"
  ];
  int64 endTime = 3 [
    (wiresmith.options.casttype) = "github.com/prometheus/common/model.Time",
    (wiresmith.options.jsontag) = "end_time"
  ];
  string query = 4 [(wiresmith.options.jsontag) = "query"];
  string status = 5 [
    (wiresmith.options.casttype) = "DeleteRequestStatus",
    (wiresmith.options.jsontag) = "status"
  ];
  int64 createdAt = 6 [
    (wiresmith.options.casttype) = "github.com/prometheus/common/model.Time",
    (wiresmith.options.jsontag) = "created_at"
  ];
  string userID = 7 [(wiresmith.options.jsontag) = "user_id"];
  int64 sequenceNum = 8 [(wiresmith.options.jsontag) = "-"];
}

// DeletionManifest represents the completion state and summary of chunks which needs processing for a set of delete requests.
// It serves two purposes:
// 1. Acts as a marker indicating all chunks for the given delete requests have been found
// 2. Stores a summary of data stored in segments:
//   - Original and duplicate deletion requests
//   - Total number of segments and chunks to be processed
//
// Once all the segments are processed, Requests and DuplicateRequests in the manifest should be marked as processed.
message DeletionManifest {
  repeated DeleteRequest requests = 1;
  repeated DeleteRequest duplicateRequests = 2;
  int32 segmentsCount = 3;
  int32 chunksCount = 4;
}

message ChunkIDs {
  repeated string IDs = 1;
}

// ChunksGroup holds a group of chunks selected by the same set of requests
message ChunksGroup {
  repeated DeleteRequest requests = 1;
  map<string, ChunkIDs> chunks = 2; // mapping of series labels to a list of ChunkIDs
}

// segment holds limited chunks in ChunksGroup.
// It also helps segregate chunks belonging to different users/tables.
message Segment {
  string tableName = 1;
  string userID = 2;
  repeated ChunksGroup chunksGroups = 3;
  int32 chunksCount = 4;
}

message DeletionJob {
  string tableName = 1;
  string userID = 2;
  repeated string chunkIDs = 3;
  repeated DeleteRequest deleteRequests = 4;
}

message Chunk {
  int64 from = 1 [(wiresmith.options.casttype) = "github.com/prometheus/common/model.Time"];
  int64 through = 2 [(wiresmith.options.casttype) = "github.com/prometheus/common/model.Time"];
  uint64 fingerprint = 3;
  uint32 checksum = 4;
  uint32 KB = 5;
  uint32 entries = 6;
}

message StorageUpdates {
  map<string, Chunk> rebuiltChunks = 1; // source chunkIDs to remove => rebuilt chunks to index
  repeated string chunksToDeIndex = 2;
}

// StorageUpdatesCollection collects updates to be made to the storage for a single Segment
message StorageUpdatesCollection {
  string tableName = 1;
  string userID = 2;
  map<string, StorageUpdates> storageUpdates = 3; // labels -> storageUpdates mapping
}
