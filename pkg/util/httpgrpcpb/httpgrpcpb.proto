// httpgrpcpb declares wire-identical local copies of dskit's
// httpgrpc.HTTPRequest/HTTPResponse/Header messages. The vendored dskit
// protos are gogo-generated and wiresmith-generated code cannot embed
// message types from another protobuf runtime (and oneof variants cannot
// use customtype bridges), so protos migrated to wiresmith reference these
// copies instead. Conversion helpers to and from the dskit types live in
// convert.go.
syntax = "proto3";

package loki.httpgrpcpb;

import "wiresmith/options.proto";

option go_package = "github.com/grafana/loki/v3/pkg/util/httpgrpcpb";

// Drop the per-message presence bitmap: gogoproto nullable=false parity
// (see WIRESMITH_MIGRATION.md).
option (wiresmith.options.no_presence_all) = true;

// HTTPRequest is wire-identical to httpgrpc.HTTPRequest.
message HTTPRequest {
  string method = 1;
  string url = 2;
  repeated Header headers = 3 [(wiresmith.options.pointer) = true];
  bytes body = 4;
}

// HTTPResponse is wire-identical to httpgrpc.HTTPResponse.
message HTTPResponse {
  int32 Code = 1;
  repeated Header headers = 2 [(wiresmith.options.pointer) = true];
  bytes body = 3;
}

// Header is wire-identical to httpgrpc.Header.
message Header {
  string key = 1;
  repeated string values = 2;
}
