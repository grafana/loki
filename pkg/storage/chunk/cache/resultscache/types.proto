syntax = "proto3";

package resultscache;

import "wiresmith/options.proto";
import "google/protobuf/any.proto";

option go_package = "github.com/grafana/loki/v3/pkg/storage/chunk/cache/resultscache";

// Drop the per-message presence bitmap: gogoproto nullable=false parity
// (see WIRESMITH_MIGRATION.md).
option (wiresmith.options.no_presence_all) = true;

// Defined here to prevent circular imports between logproto & queryrangebase
message CachingOptions {
  bool disabled = 1;
}

message CachedResponse {
  string key = 1 [(wiresmith.options.jsontag) = "key"];

  // List of cached responses; non-overlapping and in order.
  repeated Extent extents = 2 [
    (wiresmith.options.jsontag) = "extents"
  ];
}

message Extent {
  int64 start = 1 [(wiresmith.options.jsontag) = "start"];
  int64 end = 2 [(wiresmith.options.jsontag) = "end"];
  // reserved the previous key to ensure cache transition
  reserved 3;
  string trace_id = 4 [(wiresmith.options.jsontag) = "-"];
  // AnyAdapter bridges to the gogo-generated types.Any Go type used across
  // the (still gogo-generated) queryrange cache plumbing.
  google.protobuf.Any response = 5 [
    (wiresmith.options.customtype) = "AnyAdapter",
    (wiresmith.options.jsontag) = "response"
  ];
}
