syntax = "proto3";

package resultscache;

import "wiresmith/options.proto";
import "google/protobuf/timestamp.proto";
import "pkg/storage/chunk/cache/resultscache/types.proto";

option go_package = "github.com/grafana/loki/v3/pkg/storage/chunk/cache/resultscache";

// Drop the per-message presence bitmap: gogoproto nullable=false parity
// (see WIRESMITH_MIGRATION.md).
option (wiresmith.options.no_presence_all) = true;

message MockRequest {
  string path = 1;
  google.protobuf.Timestamp start = 2 [(wiresmith.options.stdtime) = true];
  google.protobuf.Timestamp end = 3 [(wiresmith.options.stdtime) = true];
  int64 step = 4;
  string query = 6;
  CachingOptions cachingOptions = 7;
}

message MockResponse {
  repeated MockLabelsPair labels = 1 [(wiresmith.options.pointer) = true];
  repeated MockSample samples = 2 [(wiresmith.options.pointer) = true];
}

message MockLabelsPair {
  string name = 1;
  string value = 2;
}

message MockSample {
  double value = 1;
  int64 timestamp_ms = 2;
}
