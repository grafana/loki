syntax = "proto3";

package admin.v1;
option go_package = "pkg/loki/labelaccess/types";

enum LabelMatcherType {
  LABEL_MATCHER_TYPE_UNSPECIFIED = 0;
  LABEL_MATCHER_TYPE_EQ = 1;
  LABEL_MATCHER_TYPE_NEQ = 2;
  LABEL_MATCHER_TYPE_RE = 3;
  LABEL_MATCHER_TYPE_NRE = 4;
}

message LabelMatcher {
  LabelMatcherType type = 1;
  string name = 2;
  string value = 3;
};

message LabelPolicy {
  repeated LabelMatcher selector = 1;
}
