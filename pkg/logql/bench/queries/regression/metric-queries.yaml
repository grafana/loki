# yaml-language-server: $schema=../schema.json
---
queries:
  - description: Sum over time with integer unwrap
    query: sum(sum_over_time(${SELECTOR} | json | unwrap rows_affected [${RANGE}]))
    kind: metric
    time_range:
      length: 24h
      step: 1m
    tags:
      - unwrap
      - sum_over_time
      - json
      - integer-field
    notes: Basic unwrap of integer field with sum aggregation
    requires:
      log_format: json
      unwrappable_fields:
        - rows_affected
  - description: Average over time with integer unwrap
    query: avg(avg_over_time(${SELECTOR} | json | unwrap rows_affected [${RANGE}]))
    kind: metric
    time_range:
      length: 24h
      step: 1m
    tags:
      - unwrap
      - avg_over_time
      - json
      - integer-field
    requires:
      log_format: json
      unwrappable_fields:
        - rows_affected
  - description: Rate of unwrapped values
    query: rate(${SELECTOR} | json | unwrap rows_affected [${RANGE}])
    kind: metric
    time_range:
      length: 24h
      step: 1m
    tags:
      - unwrap
      - rate
      - json
      - integer-field
    notes: Rate shows per-second rate of change
    requires:
      log_format: json
      unwrappable_fields:
        - rows_affected
  - description: Duration seconds conversion with avg
    query: sum by (level) (avg_over_time(${SELECTOR} | logfmt | duration != "" | unwrap duration_seconds(duration) [${RANGE}]))
    kind: metric
    time_range:
      length: 24h
      step: 1m
    tags:
      - unwrap
      - avg_over_time
      - logfmt
      - duration-conversion
      - grouping
    notes: Converts duration string to seconds, groups by level
    requires:
      log_format: logfmt
      unwrappable_fields:
        - duration
      detected_fields:
        - level
  - description: Duration seconds with sum over time
    query: sum(sum_over_time(${SELECTOR} | logfmt | duration != "" | unwrap duration_seconds(duration) [${RANGE}]))
    kind: metric
    time_range:
      length: 24h
      step: 1m
    tags:
      - unwrap
      - sum_over_time
      - logfmt
      - duration-conversion
    requires:
      log_format: logfmt
      unwrappable_fields:
        - duration
  - description: Average of duration seconds conversion
    query: avg(avg_over_time(${SELECTOR} | logfmt | duration != "" | unwrap duration_seconds(duration) [${RANGE}]))
    kind: metric
    time_range:
      length: 24h
      step: 1m
    tags:
      - unwrap
      - avg_over_time
      - logfmt
      - duration-conversion
    requires:
      log_format: logfmt
      unwrappable_fields:
        - duration
  - description: Bytes conversion with sum
    query: sum(sum_over_time(${SELECTOR} | logfmt | unwrap bytes [${RANGE}]))
    kind: metric
    time_range:
      length: 24h
      step: 1m
    tags:
      - unwrap
      - sum_over_time
      - logfmt
      - bytes-field
    notes: Sum total bytes processed
    requires:
      log_format: logfmt
      unwrappable_fields:
        - bytes
  - description: Bytes grouped by level
    query: sum by (level) (sum_over_time(${SELECTOR} | logfmt | unwrap bytes [${RANGE}]))
    kind: metric
    time_range:
      length: 24h
      step: 1m
    tags:
      - unwrap
      - sum_over_time
      - logfmt
      - bytes-field
      - grouping
    requires:
      log_format: logfmt
      unwrappable_fields:
        - bytes
  - description: Bytes grouped by detected_level
    query: sum by (detected_level) (sum_over_time(${SELECTOR} | logfmt | unwrap bytes [${RANGE}]))
    kind: metric
    time_range:
      length: 24h
      step: 1m
    tags:
      - unwrap
      - sum_over_time
      - logfmt
      - bytes-field
      - grouping
    notes: Goldfish correlation 3bbc766b
    requires:
      log_format: logfmt
      unwrappable_fields:
        - bytes
      structured_metadata:
        - detected_level
  - description: Bytes conversion function
    query: sum(sum_over_time(${SELECTOR} | json | unwrap bytes(size) [${RANGE}]))
    kind: metric
    time_range:
      length: 24h
      step: 1m
    tags:
      - unwrap
      - sum_over_time
      - json
      - bytes-conversion
    notes: Convert size strings like '1KB' to bytes
    requires:
      log_format: json
      unwrappable_fields:
        - size
  - description: Min over time with unwrap
    query: min(min_over_time(${SELECTOR} | json | unwrap rows_affected [${RANGE}]))
    kind: metric
    time_range:
      length: 24h
      step: 1m
    tags:
      - unwrap
      - min_over_time
      - json
      - integer-field
    requires:
      log_format: json
      unwrappable_fields:
        - rows_affected
  - description: Max over time with unwrap
    query: max(max_over_time(${SELECTOR} | json | unwrap rows_affected [${RANGE}]))
    kind: metric
    time_range:
      length: 24h
      step: 1m
    tags:
      - unwrap
      - max_over_time
      - json
      - integer-field
    requires:
      log_format: json
      unwrappable_fields:
        - rows_affected
  - description: Cache size unwrap
    query: avg(avg_over_time(${SELECTOR} | json | unwrap size [${RANGE}]))
    kind: metric
    time_range:
      length: 24h
      step: 1m
    tags:
      - unwrap
      - avg_over_time
      - json
      - size-field
    notes: Average cache entry size
    requires:
      log_format: json
      unwrappable_fields:
        - size
  - description: Cache TTL unwrap
    query: avg(avg_over_time(${SELECTOR} | json | unwrap ttl [${RANGE}]))
    kind: metric
    time_range:
      length: 24h
      step: 1m
    tags:
      - unwrap
      - avg_over_time
      - json
      - ttl-field
    notes: Average cache TTL in seconds
    requires:
      log_format: json
      unwrappable_fields:
        - ttl
  - description: HTTP status code distribution
    query: sum by (level) (count_over_time(${SELECTOR} | json [${RANGE}]))
    kind: metric
    time_range:
      length: 24h
      step: 1m
    tags:
      - count_over_time
      - json
      - status-field
      - grouping
    notes: Count of requests by status code
    requires:
      log_format: json
      detected_fields:
        - level
  - description: "aggregated rate with logfmt parser, label filter, and line filters"
    query: >-
      sum by (level) (rate(${SELECTOR} |= "duration" != "error" | logfmt | level!="" [${RANGE}]))


    kind: metric
    regex_selectors: true
    time_range:
      length: 24h
      step: 1m
    tags:
      - range_rate
      - logfmt_parser
      - label_filter
      - line_contains
      - line_not_contains
      - group_by
    requires:
      log_format: logfmt
      keywords:
        - duration
        - error
      detected_fields:
        - level
  - description: "aggregated count with drop but no parser"
    query: >-
      sum by (level, detected_level) (count_over_time(${SELECTOR} | drop __error__, __error_details__ [${RANGE}]))


    kind: metric
    time_range:
      length: 24h
      step: 1m
    tags: [goldfish, regression, count_over_time, agg_sum, group_by, drop]
    notes: >-
      goldfish correlation ID d608e70b-9a96-4eb2-beda-49ab57a7eb71


    requires:
      log_format: logfmt
      detected_fields: [level]
      structured_metadata: [detected_level]

  - description: "aggregated count with drop and filter"
    query: >-
      sum by (level, detected_level) (count_over_time(${SELECTOR} |= "debug" | drop __error__, __error_details__ [${RANGE}]))


    kind: metric
    time_range:
      length: 24h
      step: 1m
    tags: [goldfish, regression, count_over_time, agg_sum, group_by, drop]
    notes: >-
      goldfish correlation ID 8eef7635-532b-4451-b45b-7f67bcdabbf9 and e60075c1-d0cb-4266-aa70-6bf3a9d8bb11


    requires:
      log_format: logfmt
      detected_fields:
        - level
      structured_metadata:
        - detected_level
      keywords:
        - debug
