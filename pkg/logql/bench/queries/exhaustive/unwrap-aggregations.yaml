# yaml-language-server: $schema=../schema.json
---
queries:
  - description: Rate of unwrapped values - no grouping
    query: rate(${SELECTOR} | json | unwrap duration_ms [${RANGE}])
    kind: metric
    time_range:
      length: 24h
      step: 1m
    tags:
      - unwrap
      - rate
      - json
    notes: JSON path with duration_ms field - per-second rate of change of unwrapped values
    requires:
      log_format: json
      unwrappable_fields:
        - duration_ms
  - description: Rate with grouping by level
    query: sum by (level) (rate(${SELECTOR} | logfmt | duration != "" | unwrap duration(duration) [${RANGE}]))
    kind: metric
    time_range:
      length: 24h
      step: 1m
    tags:
      - unwrap
      - rate
      - logfmt
      - duration-conversion
      - grouping
    requires:
      log_format: logfmt
      unwrappable_fields:
        - duration
  - description: Rate with duration conversion
    query: rate(${SELECTOR} | logfmt | duration != "" | unwrap duration_seconds(duration) [${RANGE}])
    kind: metric
    time_range:
      length: 24h
      step: 1m
    tags:
      - unwrap
      - rate
      - logfmt
      - duration-conversion
    requires:
      log_format: logfmt
      unwrappable_fields:
        - duration
