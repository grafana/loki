syntax = "proto3";

package loki_ingester;

import "wiresmith/options.proto";
import "google/protobuf/timestamp.proto";
import "pkg/logproto/logproto.proto";

option go_package = "ingester";

// Drop the per-message presence bitmap: gogoproto nullable=false parity
// (see WIRESMITH_MIGRATION.md).
option (wiresmith.options.no_presence_all) = true;

// Chunk is a {de,}serializable intermediate type for chunkDesc which allows
// efficient loading/unloading to disk during WAL checkpoint recovery.
message Chunk {
  google.protobuf.Timestamp from = 1 [(wiresmith.options.stdtime) = true];
  google.protobuf.Timestamp to = 2 [(wiresmith.options.stdtime) = true];
  google.protobuf.Timestamp flushedAt = 3 [(wiresmith.options.stdtime) = true];
  google.protobuf.Timestamp lastUpdated = 4 [(wiresmith.options.stdtime) = true];
  bool closed = 5;
  bool synced = 6;
  // data to be unmarshaled into a MemChunk
  bytes data = 7;
  // data to be unmarshaled into a MemChunk's headBlock
  bytes head = 8;
}

// Series is a {de,}serializable intermediate type for Series.
message Series {
  string userID = 1;
  // post mapped fingerprint is necessary because subsequent wal writes will reference it.
  uint64 fingerprint = 2;
  repeated logproto.LegacyLabelPair labels = 3 [
    (wiresmith.options.customtype) = "github.com/grafana/loki/v3/pkg/logproto.LabelAdapter"
  ];
  repeated Chunk chunks = 4;
  // most recently pushed timestamp.
  google.protobuf.Timestamp to = 5 [(wiresmith.options.stdtime) = true];
  // most recently pushed line.
  string lastLine = 6;
  // highest counter value for pushes to this stream.
  // Used to skip already applied entries during WAL replay.
  int64 entryCt = 7;
  // highest timestamp pushed to this stream.
  google.protobuf.Timestamp highestTs = 8 [(wiresmith.options.stdtime) = true];
}
