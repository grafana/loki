syntax = "proto3";

package logproto;

import "wiresmith/options.proto";
import "pkg/logproto/logproto.proto";

option go_package = "github.com/grafana/loki/v3/pkg/logproto";

// Drop the per-message presence bitmap: gogoproto nullable=false parity
// (see WIRESMITH_MIGRATION.md).
option (wiresmith.options.no_presence_all) = true;

message FilterChunkRefRequest {
  int64 from = 1 [
    (wiresmith.options.casttype) = "github.com/prometheus/common/model.Time"
  ];
  int64 through = 2 [
    (wiresmith.options.casttype) = "github.com/prometheus/common/model.Time"
  ];
  repeated GroupedChunkRefs refs = 3 [(wiresmith.options.pointer) = true];
  // field id 4 (filters) has been removed in favour of field id 5 (plan)
  Plan plan = 5 [
    (wiresmith.options.customtype) = "github.com/grafana/loki/v3/pkg/querier/plan.QueryPlan"
  ];
  repeated string blocks = 6;
}

message FilterChunkRefResponse {
  repeated GroupedChunkRefs chunkRefs = 1 [(wiresmith.options.pointer) = true];
}

message ShortRef {
  int64 from = 1 [
    (wiresmith.options.casttype) = "github.com/prometheus/common/model.Time"
  ];
  int64 through = 2 [
    (wiresmith.options.casttype) = "github.com/prometheus/common/model.Time"
  ];
  uint32 checksum = 3;
}

message GroupedChunkRefs {
  uint64 fingerprint = 1;
  string tenant = 2;
  repeated ShortRef refs = 3 [(wiresmith.options.pointer) = true];
  // Labels are only populated on FilterChunkRefRequest. They are not returned on FilterChunkRefResponse
  // TODO(salvacorts): Consider two different messages for FilterChunkRefRequest and FilterChunkRefResponse
  IndexSeries labels = 4 [(wiresmith.options.pointer) = true];
}

message PrefetchBloomBlocksRequest {
  repeated string blocks = 1;
}

message PrefetchBloomBlocksResponse {}

service BloomGateway {
  rpc FilterChunkRefs(FilterChunkRefRequest) returns (FilterChunkRefResponse) {}
  rpc PrefetchBloomBlocks(PrefetchBloomBlocksRequest) returns (PrefetchBloomBlocksResponse) {}
}
