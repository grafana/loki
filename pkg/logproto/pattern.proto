syntax = "proto3";

package logproto;

import "wiresmith/options.proto";
import "google/protobuf/timestamp.proto";
import "pkg/logproto/logproto.proto";
import "pkg/push/push.proto";

option go_package = "github.com/grafana/loki/v3/pkg/logproto";

// Drop the per-message presence bitmap: gogoproto nullable=false parity
// (see WIRESMITH_MIGRATION.md).
option (wiresmith.options.no_presence_all) = true;

service Pattern {
  rpc Push(PushRequest) returns (PushResponse) {}
  rpc Query(QueryPatternsRequest) returns (stream QueryPatternsResponse) {}
}

message QueryPatternsRequest {
  string query = 1;
  google.protobuf.Timestamp start = 2 [(wiresmith.options.stdtime) = true];
  google.protobuf.Timestamp end = 3 [(wiresmith.options.stdtime) = true];
  int64 step = 4;
}

message QueryPatternsResponse {
  repeated PatternSeries series = 1 [(wiresmith.options.pointer) = true];
}

message PatternSeries {
  string pattern = 1;
  repeated PatternSample samples = 2 [(wiresmith.options.pointer) = true];
  string level = 3;
}

message PatternSample {
  int64 timestamp = 1 [
    (wiresmith.options.casttype) = "github.com/prometheus/common/model.Time"
  ];
  int64 value = 2;
}
