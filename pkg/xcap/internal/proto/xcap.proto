// xcap.proto holds types for serializing xcap via protobuf.
syntax = "proto3";

package loki.xcap;

import "gogoproto/gogo.proto";

option go_package = "github.com/grafana/loki/v3/pkg/xcap/internal/proto";

// Capture is protobuf representation of a Capture.
message Capture {
  // A list of Regions recorded in the Capture.
  repeated Region regions = 1 [(gogoproto.nullable) = false];

  reserved 2;
  reserved "statistics";
}

// Region is protobuf representation of a Region.
message Region {
  // Name is the name of the region.
  string name = 1;

  // ObservationsV2 is the flattened observation representation.
  repeated ObservationV2 observations_v2 = 10 [(gogoproto.nullable) = false];

  reserved 2 to 9;
  reserved "start_time", "end_time", "id", "parent_id", "attributes", "events", "status", "observations";
}

// ObservationV2 represents an aggregated observation without a nested message
// or oneof. ValueBits is interpreted according to the data type registered
// for stat_id.
message ObservationV2 {
  // StatId is the global stable ID assigned by pkg/xcap/statid.
  //
  // Field 4 is intentionally new: reserving the former statistic_id field
  // ensures old worker observations are skipped rather than interpreted as
  // global IDs during a rolling upgrade.
  uint32 stat_id = 4;

  // Count is the number of observations aggregated.
  uint32 count = 2;

  // ValueBits holds the encoded aggregated observation value.
  fixed64 value_bits = 3;

  reserved 1;
  reserved "statistic_id";
}
